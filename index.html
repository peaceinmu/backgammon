<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>慢慢五子棋</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  overflow: hidden;
  font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
  color: #f6f1ff;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.32), transparent 18%),
    radial-gradient(circle at 82% 18%, rgba(190,220,255,.30), transparent 23%),
    radial-gradient(circle at 50% 72%, rgba(202,180,255,.22), transparent 35%),
    linear-gradient(160deg, #466fc0 0%, #5d72d4 34%, #7c67c4 64%, #b99be5 100%);
}

#app {
  width: 100vw;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

.background {
  position: absolute;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(to bottom, rgba(74,105,184,.18), rgba(31,35,82,.62)),
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.34), transparent 18%),
    radial-gradient(circle at 80% 16%, rgba(210,230,255,.26), transparent 24%),
    linear-gradient(180deg, #dcecff 0%, #8aa8e8 40%, #5f64c2 68%, #2d317e 100%);
}

.background::before {
  content: "";
  position: absolute;
  left: -5%;
  right: -5%;
  bottom: 0;
  height: 42%;
  background:
    linear-gradient(to top, rgba(28,32,85,.94), rgba(28,32,85,.18)),
    url("data:image/svg+xml,%3Csvg width='1200' height='380' viewBox='0 0 1200 380' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 250 L120 150 L220 225 L350 95 L500 230 L640 125 L790 235 L935 80 L1080 225 L1200 130 L1200 380 L0 380 Z' fill='%232c3d8f' opacity='0.72'/%3E%3Cpath d='M0 285 L150 195 L280 260 L415 150 L570 275 L710 178 L850 268 L1010 145 L1200 260 L1200 380 L0 380 Z' fill='%233f51ad' opacity='0.58'/%3E%3Cpath d='M0 330 C160 280 260 325 420 270 C590 213 740 305 910 245 C1040 200 1140 245 1200 220 L1200 380 L0 380 Z' fill='%231f2b6d' opacity='0.86'/%3E%3C/svg%3E");
  background-size: cover;
  background-position: bottom center;
}

.mist {
  position: absolute;
  inset: -10%;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 25%, rgba(255,255,255,.20), transparent 26%),
    radial-gradient(circle at 70% 30%, rgba(210,230,255,.23), transparent 28%),
    radial-gradient(circle at 50% 80%, rgba(209,190,255,.17), transparent 35%);
  animation: drift 18s ease-in-out infinite alternate;
}

@keyframes drift {
  from { transform: translateX(-2%) translateY(1%); }
  to { transform: translateX(2%) translateY(-1%); }
}

.screen {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: none;
}

.screen.active {
  display: flex;
}

#menuScreen {
  align-items: center;
  justify-content: center;
  padding: 22px;
}

.menu-scene {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.moon {
  position: absolute;
  top: 4.5vh;
  right: 8vw;
  width: clamp(48px, 10vw, 86px);
  height: clamp(48px, 10vw, 86px);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fffaf0 0%, #f6e7ff 44%, #d8c2ff 72%, rgba(216,194,255,.7) 100%);
  box-shadow:
    0 0 20px rgba(255,243,255,.95),
    0 0 42px rgba(205,225,255,.82),
    0 0 72px rgba(164,189,255,.56);
}

.moon::after {
  content: "";
  position: absolute;
  width: 78%;
  height: 78%;
  border-radius: 50%;
  right: -15%;
  top: 6%;
  background: rgba(82,92,176,.56);
  filter: blur(1px);
}

.star {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #fff8db;
  box-shadow: 0 0 8px rgba(255,248,219,1), 0 0 18px rgba(205,228,255,.9);
  animation: twinkle 2.8s ease-in-out infinite alternate;
}

.star::before,
.star::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  background: rgba(255,248,219,.9);
  transform: translate(-50%, -50%);
  border-radius: 999px;
}

.star::before {
  width: 18px;
  height: 1px;
}

.star::after {
  width: 1px;
  height: 18px;
}

.s1 { top: 15vh; left: 16vw; }
.s2 { top: 19vh; left: 76vw; transform: scale(.72); animation-delay: .6s; }
.s3 { top: 34vh; left: 11vw; transform: scale(.58); animation-delay: 1.2s; }
.s4 { top: 12vh; left: 47vw; transform: scale(.82); animation-delay: 1.7s; }
.s5 { top: 42vh; left: 82vw; transform: scale(.55); animation-delay: .9s; }

@keyframes twinkle {
  from { opacity: .45; filter: blur(.2px); }
  to { opacity: 1; filter: blur(0); }
}

.menu-card {
  position: relative;
  z-index: 2;
  width: min(480px, 94vw);
  padding: 26px 22px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(180deg, rgba(80,88,178,.68), rgba(43,45,112,.82));
  box-shadow:
    0 22px 60px rgba(0,0,0,.32),
    inset 0 0 45px rgba(225,235,255,.13);
  backdrop-filter: blur(13px);
  text-align: center;
}

.title {
  margin: 0;
  font-size: clamp(34px, 8vw, 56px);
  letter-spacing: .12em;
  font-weight: 700;
  color: #f2f8ff;
  text-shadow:
    0 0 14px rgba(198,224,255,.95),
    0 4px 10px rgba(0,0,0,.45);
}

.subtitle {
  margin: 12px 0 20px;
  color: #edf4ff;
  line-height: 1.7;
  font-size: 15px;
}

.section-title {
  margin: 16px 0 9px;
  color: #f0f6ff;
  font-size: 15px;
  letter-spacing: .12em;
}

.choice-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.difficulty-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(96px, 136px));
  gap: 10px;
  justify-content: center;
}

.choice-btn,
.main-btn,
.small-btn {
  position: relative;
  border: none;
  outline: none;
  overflow: hidden;
  color: #f8fbff;
  background:
    radial-gradient(circle at 28% 18%, rgba(255,255,255,.78), rgba(255,255,255,.22) 20%, rgba(255,255,255,.06) 38%, transparent 56%),
    linear-gradient(180deg, rgba(146,178,255,.78), rgba(109,99,211,.82) 55%, rgba(84,76,176,.88));
  border-radius: 999px;
  padding: 11px 18px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow:
    0 10px 20px rgba(0,0,0,.18),
    inset 0 2px 7px rgba(255,255,255,.40),
    inset 0 -8px 14px rgba(62,60,159,.28);
  transition: transform .15s, box-shadow .15s;
}

.choice-btn::before,
.main-btn::before,
.small-btn::before {
  content: "";
  position: absolute;
  left: 13%;
  top: 9%;
  width: 68%;
  height: 42%;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,.14), rgba(255,255,255,0));
  opacity: .74;
  filter: blur(7px);
  pointer-events: none;
}

.choice-btn:hover,
.main-btn:hover,
.small-btn:hover {
  transform: translateY(-1px) scale(1.015);
  box-shadow:
    0 14px 28px rgba(0,0,0,.22),
    inset 0 2px 8px rgba(255,255,255,.48),
    inset 0 -8px 14px rgba(62,60,159,.25);
}

.choice-btn.selected {
  background:
    radial-gradient(circle at 28% 18%, rgba(255,255,255,.88), rgba(255,255,255,.24) 24%, rgba(255,255,255,.08) 42%, transparent 58%),
    linear-gradient(180deg, rgba(235,247,255,.98), rgba(177,210,255,.92) 45%, rgba(180,149,235,.95));
  color: #30407a;
}

.main-btn {
  width: min(300px, 80vw);
  margin-top: 24px;
  padding: 14px 20px;
  font-size: 18px;
  background:
    radial-gradient(circle at 28% 18%, rgba(255,255,255,.88), rgba(255,255,255,.23) 24%, rgba(255,255,255,.07) 43%, transparent 60%),
    linear-gradient(180deg, #e9f6ff, #afcfff 46%, #a98be4);
  color: #30407a;
}

.hint {
  margin-top: 16px;
  font-size: 13px;
  color: rgba(238,246,255,.82);
  line-height: 1.6;
}

#gameScreen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
}

.game-glyph {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: min(520px, 88vw);
  height: 82px;
  z-index: 3;
  pointer-events: none;
  opacity: .36;
  background:
    url("data:image/svg+xml,%3Csvg width='700' height='110' viewBox='0 0 700 110' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23eef7ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M60 55 C120 18 180 18 240 55 C300 92 400 92 460 55 C520 18 580 18 640 55' opacity='.8'/%3E%3Ccircle cx='350' cy='55' r='28'/%3E%3Ccircle cx='350' cy='55' r='12'/%3E%3Cpath d='M350 18 L350 92 M313 55 L387 55'/%3E%3Cpath d='M130 55 C145 35 165 35 180 55 C165 75 145 75 130 55 Z'/%3E%3Cpath d='M520 55 C535 35 555 35 570 55 C555 75 535 75 520 55 Z'/%3E%3Cpath d='M75 38 L92 55 L75 72 M625 38 L608 55 L625 72'/%3E%3C/g%3E%3C/svg%3E");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  filter: drop-shadow(0 0 9px rgba(200,225,255,.65));
}

.game-glyph.top {
  top: calc(env(safe-area-inset-top) + 56px);
}

.game-glyph.bottom {
  bottom: calc(env(safe-area-inset-bottom) + 12px);
  transform: translateX(-50%) rotate(180deg);
}

.topbar {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 10px);
  left: 10px;
  right: 10px;
  min-height: 58px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  align-items: start;
  z-index: 4;
}

.status-panel {
  min-width: 0;
  padding: 9px 12px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 30% 15%, rgba(255,255,255,.35), transparent 34%),
    rgba(52,63,148,.68);
  border: none;
  backdrop-filter: blur(10px);
  text-align: center;
  box-shadow: 0 10px 26px rgba(0,0,0,.18);
}

#statusText {
  font-size: clamp(14px, 3.6vw, 18px);
  color: #f4f9ff;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#modeText {
  margin-top: 4px;
  font-size: 12px;
  color: rgba(240,247,255,.84);
}

.small-btn {
  padding: 9px 13px;
  font-size: 13px;
  background:
    radial-gradient(circle at 28% 18%, rgba(255,255,255,.68), rgba(255,255,255,.15) 22%, transparent 46%),
    linear-gradient(180deg, rgba(119,156,238,.78), rgba(79,79,190,.78));
  backdrop-filter: blur(8px);
}

.right-controls {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: stretch;
}

.icon-btn {
  width: 100%;
  height: 38px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-btn svg {
  display: block;
  width: 24px;
  height: 24px;
}

.board-wrap {
  position: relative;
  width: min(92vw, 82dvh, 720px);
  height: min(92vw, 82dvh, 720px);
  margin-top: 58px;
  border-radius: 24px;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.30), transparent 20%),
    linear-gradient(135deg, rgba(205,224,255,.95), rgba(171,180,255,.92) 44%, rgba(122,116,215,.96));
  border: 2px solid rgba(225,239,255,.45);
  box-shadow:
    0 28px 70px rgba(0,0,0,.42),
    inset 0 0 35px rgba(255,255,255,.24),
    inset 0 0 85px rgba(58,70,155,.34);
  overflow: hidden;
  z-index: 4;
}

.board-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,.12), transparent 24%, rgba(59,70,158,.08) 50%, transparent 76%, rgba(255,255,255,.08)),
    repeating-linear-gradient(90deg, rgba(70,90,160,.05) 0 5px, transparent 5px 15px);
  pointer-events: none;
}

.board-wrap::after {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 18px;
  pointer-events: none;
  opacity: .35;
  z-index: 1;
  background:
    url("data:image/svg+xml,%3Csvg width='640' height='640' viewBox='0 0 640 640' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23eef7ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M54 92 C92 62 135 64 160 96 C129 93 100 107 78 134' opacity='0.95'/%3E%3Cpath d='M64 132 C106 118 138 130 162 164' opacity='0.75'/%3E%3Cpath d='M586 92 C548 62 505 64 480 96 C511 93 540 107 562 134' opacity='0.95'/%3E%3Cpath d='M576 132 C534 118 502 130 478 164' opacity='0.75'/%3E%3Cpath d='M54 548 C92 578 135 576 160 544 C129 547 100 533 78 506' opacity='0.95'/%3E%3Cpath d='M64 508 C106 522 138 510 162 476' opacity='0.75'/%3E%3Cpath d='M586 548 C548 578 505 576 480 544 C511 547 540 533 562 506' opacity='0.95'/%3E%3Cpath d='M576 508 C534 522 502 510 478 476' opacity='0.75'/%3E%3Ccircle cx='90' cy='90' r='8'/%3E%3Ccircle cx='550' cy='90' r='8'/%3E%3Ccircle cx='90' cy='550' r='8'/%3E%3Ccircle cx='550' cy='550' r='8'/%3E%3Cpath d='M320 42 C334 58 334 74 320 90 C306 74 306 58 320 42 Z' opacity='0.72'/%3E%3Cpath d='M320 598 C334 582 334 566 320 550 C306 566 306 582 320 598 Z' opacity='0.72'/%3E%3Cpath d='M42 320 C58 306 74 306 90 320 C74 334 58 334 42 320 Z' opacity='0.72'/%3E%3Cpath d='M598 320 C582 306 566 306 550 320 C566 334 582 334 598 320 Z' opacity='0.72'/%3E%3C/g%3E%3C/svg%3E");
  background-size: 100% 100%;
  background-repeat: no-repeat;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  z-index: 2;
}

.spell-ring {
  position: absolute;
  width: 120px;
  height: 120px;
  pointer-events: none;
  border-radius: 50%;
  border: 1px solid rgba(225,240,255,.9);
  box-shadow:
    0 0 18px rgba(205,228,255,.9),
    inset 0 0 20px rgba(255,255,255,.30);
  transform: translate(-50%, -50%) scale(.2);
  opacity: 0;
  z-index: 5;
}

.spell-ring.show {
  animation: ring .45s ease-out forwards;
}

@keyframes ring {
  0% {
    opacity: .95;
    transform: translate(-50%, -50%) scale(.15) rotate(0);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.15) rotate(35deg);
  }
}

.firework-layer {
  position: absolute;
  inset: 0;
  z-index: 9;
  pointer-events: none;
  overflow: hidden;
}

.spark {
  position: absolute;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,246,255,.96);
  box-shadow:
    0 0 8px rgba(255,246,255,.95),
    0 0 18px rgba(196,224,255,.85);
  transform: translate(-50%, -50%);
  animation: sparkleFly 1200ms ease-out forwards;
}

@keyframes sparkleFly {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(.55);
  }
  65% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.1);
  }
}

.result-modal {
  position: absolute;
  inset: 0;
  z-index: 8;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(16,20,54,.18);
  backdrop-filter: blur(2px);
  padding: 22px;
}

.result-modal.active {
  display: flex;
}

.result-card {
  position: relative;
  width: min(360px, 88vw);
  padding: 28px 20px 24px;
  border-radius: 28px;
  background:
    radial-gradient(circle at 25% 14%, rgba(255,255,255,.42), transparent 30%),
    linear-gradient(180deg, rgba(95,118,214,.86), rgba(67,62,160,.92));
  border: none;
  text-align: center;
  box-shadow:
    0 0 28px rgba(205,228,255,.46),
    0 0 60px rgba(184,165,255,.36),
    0 24px 70px rgba(0,0,0,.34),
    inset 0 3px 12px rgba(255,255,255,.28);
  overflow: visible;
}

.result-card::before {
  content: "";
  position: absolute;
  inset: -18px;
  border-radius: 38px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.72), transparent 8%),
    radial-gradient(circle at 80% 26%, rgba(204,230,255,.72), transparent 9%),
    radial-gradient(circle at 30% 88%, rgba(234,210,255,.72), transparent 8%),
    radial-gradient(circle at 76% 82%, rgba(255,248,216,.66), transparent 7%);
  filter: blur(2px);
  opacity: .72;
  animation: resultGlow 1.8s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes resultGlow {
  from {
    opacity: .45;
    transform: scale(.98);
  }
  to {
    opacity: .88;
    transform: scale(1.02);
  }
}

#resultTitle {
  margin: 0;
  color: #f6fbff;
  font-size: 32px;
  text-shadow:
    0 0 12px rgba(210,230,255,.95),
    0 0 22px rgba(229,206,255,.72);
}

#resultDesc {
  display: none;
}

.bottom-note {
  position: absolute;
  bottom: calc(env(safe-area-inset-bottom) + 8px);
  left: 12px;
  right: 12px;
  text-align: center;
  color: rgba(238,246,255,.74);
  font-size: 12px;
  z-index: 4;
  pointer-events: none;
}

.magic-dust {
  position: absolute;
  width: 5px;
  height: 5px;
  background: rgba(218,236,255,.88);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(218,236,255,.95);
  animation: floatUp 3.5s linear forwards;
  z-index: 3;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(.6); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translateY(-90px) scale(1.15); opacity: 0; }
}

@media (max-width: 720px) {
  #gameScreen {
    justify-content: center;
    padding-left: 0;
    padding-right: 0;
  }

  .topbar {
    top: calc(env(safe-area-inset-top) + 6px);
    left: 6px;
    right: 6px;
    grid-template-columns: 56px 1fr 56px;
  }

  .small-btn {
    padding: 8px;
    font-size: 12px;
  }

  .icon-btn {
    height: 36px;
  }

  .icon-btn svg {
    width: 22px;
    height: 22px;
  }

  .right-controls {
    gap: 6px;
  }

  .board-wrap {
    width: min(100vw, calc(100dvh - 120px));
    height: min(100vw, calc(100dvh - 120px));
    border-radius: 18px;
    margin-top: 52px;
  }

  .menu-card {
    padding: 24px 18px;
  }

  .choice-btn {
    min-width: 82px;
    padding: 10px 14px;
  }

  .difficulty-grid {
    grid-template-columns: repeat(2, minmax(92px, 126px));
    gap: 10px;
  }

  .bottom-note {
    display: none;
  }

  .moon {
    top: 4vh;
    right: 6vw;
    width: 52px;
    height: 52px;
  }

  .game-glyph.top {
    top: calc(env(safe-area-inset-top) + 62px);
  }

  .game-glyph.bottom {
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    height: 62px;
  }
}

@media (orientation: landscape) and (max-height: 520px) {
  .topbar {
    grid-template-columns: 68px 1fr 68px;
    min-height: 46px;
  }

  .status-panel {
    padding: 6px 10px;
  }

  #modeText {
    display: none;
  }

  .board-wrap {
    margin-top: 46px;
    width: min(82vh, 72vw);
    height: min(82vh, 72vw);
  }

  .moon {
    top: 5vh;
    right: 6vw;
    width: 46px;
    height: 46px;
  }

  .game-glyph {
    display: none;
  }
}
</style>
</head>

<body>
<div id="app">
  <div class="background"></div>
  <div class="mist"></div>

  <section id="menuScreen" class="screen active">
    <div class="menu-scene">
      <div class="moon"></div>
      <div class="star s1"></div>
      <div class="star s2"></div>
      <div class="star s3"></div>
      <div class="star s4"></div>
      <div class="star s5"></div>
    </div>

    <div class="menu-card">
      <h1 class="title">慢慢五子棋</h1>
      <p class="subtitle">在藍紫色的星霧森林裡，<br>慢慢思考，安靜對弈。</p>

      <div class="section-title">模式</div>
      <div class="choice-row">
        <button class="choice-btn selected" data-mode="ai">和電腦對戰</button>
        <button class="choice-btn" data-mode="pvp">兩人對戰</button>
      </div>

      <div class="section-title">難度</div>
      <div class="difficulty-grid">
        <button class="choice-btn" data-difficulty="easy">簡單</button>
        <button class="choice-btn selected" data-difficulty="normal">普通</button>
        <button class="choice-btn" data-difficulty="hard">困難</button>
        <button class="choice-btn" data-difficulty="master">大師</button>
      </div>

      <button id="startBtn" class="main-btn">開始遊戲</button>

      <div class="hint">手機與電腦皆可遊玩。<br>黑棋先手，先連成五子者獲勝。</div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="game-glyph top"></div>
    <div class="game-glyph bottom"></div>
    <div id="fireworkLayer" class="firework-layer"></div>

    <div class="topbar">
      <button id="backBtn" class="small-btn">選單</button>

      <div class="status-panel">
        <div id="statusText">黑棋回合</div>
        <div id="modeText">和電腦對戰｜普通</div>
      </div>

      <div class="right-controls">
        <button id="restartBtn" class="small-btn">重開</button>
        <button id="muteBtn" class="small-btn icon-btn" aria-label="靜音背景音樂" title="靜音背景音樂"></button>
      </div>
    </div>

    <div id="boardWrap" class="board-wrap">
      <canvas id="boardCanvas"></canvas>
      <div id="spellRing" class="spell-ring"></div>
    </div>

    <div class="bottom-note">背景樂會在第一次點擊後啟動。可按右上角音量圖示關閉背景樂。</div>

    <div id="resultModal" class="result-modal">
      <div id="resultCard" class="result-card">
        <h2 id="resultTitle">你贏了！</h2>
        <div id="resultDesc"></div>
        <button id="againBtn" class="main-btn">再來一局</button>
        <button id="menuBtn" class="small-btn" style="margin-top:12px;">回到選單</button>
      </div>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  const SIZE = 15;
  const EMPTY = 0;
  const BLACK = 1;
  const WHITE = 2;
  const DEEP_BLUE = "#163B7A";

  const menuScreen = document.getElementById("menuScreen");
  const gameScreen = document.getElementById("gameScreen");
  const boardWrap = document.getElementById("boardWrap");
  const canvas = document.getElementById("boardCanvas");
  const ctx = canvas.getContext("2d");

  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");
  const restartBtn = document.getElementById("restartBtn");
  const againBtn = document.getElementById("againBtn");
  const menuBtn = document.getElementById("menuBtn");
  const muteBtn = document.getElementById("muteBtn");

  const statusText = document.getElementById("statusText");
  const modeText = document.getElementById("modeText");
  const resultModal = document.getElementById("resultModal");
  const resultTitle = document.getElementById("resultTitle");
  const resultCard = document.getElementById("resultCard");
  const spellRing = document.getElementById("spellRing");
  const fireworkLayer = document.getElementById("fireworkLayer");

  let board = [];
  let currentPlayer = BLACK;
  let gameOver = false;
  let mode = "ai";
  let difficulty = "normal";
  let cell = 0;
  let margin = 0;
  let lastMove = null;

  let audioStarted = false;
  let audioCtx = null;
  let bgGain = null;
  let persistentFireworkTimer = null;
  let bgMuted = false;

  function initBoard() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
    currentPlayer = BLACK;
    gameOver = false;
    lastMove = null;
    stopPersistentFireworks();
    resultModal.classList.remove("active");
    updateStatus();
    resizeCanvas();
  }

  function showScreen(name) {
    menuScreen.classList.remove("active");
    gameScreen.classList.remove("active");

    if (name === "menu") {
      menuScreen.classList.add("active");
    } else {
      gameScreen.classList.add("active");
    }
  }

  document.querySelectorAll("[data-mode]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      mode = btn.dataset.mode;

      document.querySelectorAll("[data-mode]").forEach(function (b) {
        b.classList.remove("selected");
      });

      btn.classList.add("selected");
      updateModeButtons();
    });
  });

  document.querySelectorAll("[data-difficulty]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      difficulty = btn.dataset.difficulty;

      document.querySelectorAll("[data-difficulty]").forEach(function (b) {
        b.classList.remove("selected");
      });

      btn.classList.add("selected");
    });
  });

  function updateModeButtons() {
    document.querySelectorAll("[data-difficulty]").forEach(function (btn) {
      btn.disabled = mode === "pvp";
      btn.style.opacity = mode === "pvp" ? "0.45" : "1";
    });
  }

  startBtn.addEventListener("click", function () {
    startAudio();
    showScreen("game");
    initBoard();
  });

  backBtn.addEventListener("click", function () {
    stopPersistentFireworks();
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  restartBtn.addEventListener("click", function () {
    startAudio();
    initBoard();
  });

  againBtn.addEventListener("click", function () {
    startAudio();
    initBoard();
  });

  menuBtn.addEventListener("click", function () {
    stopPersistentFireworks();
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  muteBtn.addEventListener("click", function () {
    startAudio();
    bgMuted = !bgMuted;
    applyBgMuteState();
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      resumeAudio();
    }
  });

  window.addEventListener("pageshow", resumeAudio);
  window.addEventListener("focus", resumeAudio);

  function updateStatus() {
    if (gameOver) return;

    const playerName = currentPlayer === BLACK ? "黑棋" : "白棋";

    if (mode === "ai") {
      statusText.textContent = currentPlayer === BLACK ? "你的回合｜黑棋" : "電腦思考中｜白棋";
      modeText.textContent = "和電腦對戰｜" + difficultyName(difficulty);
    } else {
      statusText.textContent = playerName + "回合";
      modeText.textContent = "兩人對戰";
    }
  }

  function difficultyName(value) {
    if (value === "easy") return "簡單";
    if (value === "hard") return "困難";
    if (value === "master") return "大師";
    return "普通";
  }

  function resizeCanvas() {
    const rect = boardWrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    margin = rect.width * 0.065;
    cell = (rect.width - margin * 2) / (SIZE - 1);

    drawBoard();
  }

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("orientationchange", function () {
    setTimeout(resizeCanvas, 250);
  });

  function drawBoard() {
    const w = boardWrap.getBoundingClientRect().width;
    const h = boardWrap.getBoundingClientRect().height;

    ctx.clearRect(0, 0, w, h);

    drawDreamTexture(w, h);
    drawSoftVines(w, h);
    drawMagicCorners(w, h);
    drawGrid();
    drawStarPoints();
    drawPieces();

    if (lastMove) {
      drawLastMove(lastMove.x, lastMove.y);
    }
  }

  function drawDreamTexture(w, h) {
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, "rgba(225, 240, 255, 0.60)");
    grad.addColorStop(0.42, "rgba(178, 198, 255, 0.48)");
    grad.addColorStop(1, "rgba(112, 103, 205, 0.50)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = 0.24;

    for (let i = 0; i < 28; i++) {
      ctx.beginPath();
      const y = (h / 28) * i + Math.sin(i) * 8;
      ctx.moveTo(0, y);

      for (let x = 0; x <= w; x += 40) {
        ctx.lineTo(x, y + Math.sin(x * 0.025 + i) * 8);
      }

      ctx.strokeStyle = i % 2 ? "#6178c8" : "#f0f8ff";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    for (let i = 0; i < 14; i++) {
      const x = (i * 47) % w;
      const y = (i * 83) % h;
      const r = (i % 4 + 1) * cell * 0.06;

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 250, 255, 0.13)";
      ctx.fill();
    }

    ctx.restore();
  }

  function drawSoftVines(w, h) {
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = "rgba(240, 248, 255, 0.74)";
    ctx.lineWidth = 1.6;
    ctx.lineCap = "round";

    drawVine(26, h * 0.22, 1);
    drawVine(w - 26, h * 0.78, -1);

    ctx.restore();

    function drawVine(startX, startY, dir) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);

      for (let i = 0; i < 7; i++) {
        const x = startX + dir * (18 + i * 13);
        const y = startY + Math.sin(i * 0.9) * 24 + i * 18 * (startY < h / 2 ? 1 : -1);

        ctx.quadraticCurveTo(startX + dir * (22 + i * 12), y - 15, x, y);

        if (i % 2 === 0) {
          drawLeaf(x, y, dir);
        }
      }

      ctx.stroke();
    }

    function drawLeaf(x, y, dir) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(dir * 0.8);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(dir * 12, -8, dir * 22, 0);
      ctx.quadraticCurveTo(dir * 12, 8, 0, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawMagicCorners(w, h) {
    ctx.save();
    ctx.globalAlpha = 0.46;
    ctx.strokeStyle = "rgba(235, 246, 255, 0.80)";
    ctx.lineWidth = 1.2;

    const r = w * 0.09;
    const gap = w * 0.035;

    [[gap, gap], [w - gap, gap], [gap, h - gap], [w - gap, h - gap]].forEach(function (p, index) {
      const x = p[0];
      const y = p[1];

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
      ctx.stroke();

      for (let a = 0; a < 6; a++) {
        const angle = (Math.PI * 2 / 6) * a + index * 0.2;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
        ctx.stroke();
      }
    });

    ctx.restore();
  }

  function drawGrid() {
    ctx.save();
    ctx.strokeStyle = "rgba(48, 61, 133, 0.84)";
    ctx.lineWidth = 1.2;

    for (let i = 0; i < SIZE; i++) {
      const p = margin + i * cell;

      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(margin + cell * (SIZE - 1), p);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, margin + cell * (SIZE - 1));
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawStarPoints() {
    const points = [
      [3,3], [7,3], [11,3],
      [3,7], [7,7], [11,7],
      [3,11], [7,11], [11,11]
    ];

    ctx.save();

    points.forEach(function (p) {
      const px = margin + p[0] * cell;
      const py = margin + p[1] * cell;

      ctx.beginPath();
      ctx.arc(px, py, Math.max(3, cell * 0.09), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(47, 61, 132, 0.88)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, py, Math.max(8, cell * 0.2), 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(245, 250, 255, 0.36)";
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    ctx.restore();
  }

  function drawPieces() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          drawPiece(x, y, board[y][x]);
        }
      }
    }
  }

  function drawPiece(x, y, player) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.38;

    ctx.save();

    ctx.beginPath();
    ctx.arc(px + r * 0.18, py + r * 0.22, r * 1.02, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.23)";
    ctx.fill();

    const grad = ctx.createRadialGradient(px - r * 0.35, py - r * 0.35, r * 0.15, px, py, r);

    if (player === BLACK) {
      grad.addColorStop(0, "#737ca4");
      grad.addColorStop(0.35, "#272b4a");
      grad.addColorStop(1, "#080915");
    } else {
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#f1f8ff");
      grad.addColorStop(1, "#b6c9f4");
    }

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px - r * 0.28, py - r * 0.28, r * 0.17, 0, Math.PI * 2);
    ctx.fillStyle = player === BLACK ? "rgba(245,250,255,0.28)" : "rgba(255,255,255,0.82)";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = player === BLACK ? "rgba(230,245,255,0.24)" : "rgba(72,88,150,0.36)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  function drawLastMove(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.17;

    ctx.save();

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(244, 250, 255, 0.96)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, r * 0.32, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(244, 250, 255, 0.96)";
    ctx.fill();

    ctx.restore();
  }

  function getBoardPosition(evt) {
    const rect = canvas.getBoundingClientRect();
    const clientX = evt.clientX;
    const clientY = evt.clientY;

    const x = Math.round((clientX - rect.left - margin) / cell);
    const y = Math.round((clientY - rect.top - margin) / cell);

    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) {
      return null;
    }

    const px = margin + x * cell;
    const py = margin + y * cell;
    const dx = clientX - rect.left - px;
    const dy = clientY - rect.top - py;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > cell * 0.52) {
      return null;
    }

    return { x, y };
  }

  canvas.addEventListener("pointerdown", function (evt) {
    evt.preventDefault();
    startAudio();

    if (gameOver) return;
    if (mode === "ai" && currentPlayer === WHITE) return;

    const pos = getBoardPosition(evt);
    if (!pos) return;

    placeMove(pos.x, pos.y, currentPlayer);
  });

  function placeMove(x, y, player) {
    if (board[y][x] !== EMPTY || gameOver) return false;

    board[y][x] = player;
    lastMove = { x, y };

    showSpellAt(x, y);
    drawBoard();

    if (checkWin(x, y, player)) {
      endGame(player);
      return true;
    }

    if (isBoardFull()) {
      endDraw();
      return true;
    }

    currentPlayer = player === BLACK ? WHITE : BLACK;
    updateStatus();

    if (mode === "ai" && currentPlayer === WHITE && !gameOver) {
      const delay = difficulty === "master" ? 220 : difficulty === "hard" ? 300 : 380;
      setTimeout(aiTurn, delay);
    }

    return true;
  }

  function showSpellAt(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;

    spellRing.style.left = px + "px";
    spellRing.style.top = py + "px";
    spellRing.classList.remove("show");
    void spellRing.offsetWidth;
    spellRing.classList.add("show");
  }

  function checkWin(x, y, player) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];

    for (const d of dirs) {
      const dx = d[0];
      const dy = d[1];
      let count = 1;

      count += countDirection(x, y, dx, dy, player);
      count += countDirection(x, y, -dx, -dy, player);

      if (count >= 5) return true;
    }

    return false;
  }

  function countDirection(x, y, dx, dy, player) {
    let count = 0;
    let nx = x + dx;
    let ny = y + dy;

    while (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === player) {
      count++;
      nx += dx;
      ny += dy;
    }

    return count;
  }

  function isBoardFull() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === EMPTY) return false;
      }
    }
    return true;
  }

  function endGame(player) {
    gameOver = true;
    playWinSound();

    const winner = player === BLACK ? "黑棋" : "白棋";

    if (mode === "ai") {
      resultTitle.textContent = player === BLACK ? "你贏了！" : "電腦勝利";
    } else {
      resultTitle.textContent = winner + "勝利";
    }

    statusText.textContent = winner + "勝利";
    resultModal.classList.add("active");
    startPersistentFireworks();
  }

  function endDraw() {
    gameOver = true;
    resultTitle.textContent = "平手";
    statusText.textContent = "平手";
    resultModal.classList.add("active");
  }

  function aiTurn() {
    if (gameOver) return;

    const move = getAIMove();

    if (move) {
      placeMove(move.x, move.y, WHITE);
    }
  }

  function getAIMove() {
    const moves = getCandidateMoves(2);

    if (moves.length === 0) return { x: 7, y: 7 };

    if (difficulty === "easy") return getEasyMove(moves);
    if (difficulty === "normal") return getNormalMove(moves);
    if (difficulty === "hard") return getHardMove(moves);
    return getMasterMove(moves);
  }

  function getCandidateMoves(radius) {
    const candidates = [];
    const seen = new Set();
    let hasStone = false;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          hasStone = true;

          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const nx = x + dx;
              const ny = y + dy;

              if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === EMPTY) {
                const key = nx + "," + ny;

                if (!seen.has(key)) {
                  seen.add(key);
                  candidates.push({ x: nx, y: ny });
                }
              }
            }
          }
        }
      }
    }

    if (!hasStone) return [{ x: 7, y: 7 }];
    return candidates;
  }

  function getEasyMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate && Math.random() < 0.65) return immediate;

    const block = findWinningMove(BLACK);
    if (block && Math.random() < 0.55) return block;

    if (Math.random() < 0.42) {
      return moves[Math.floor(Math.random() * moves.length)];
    }

    return getBestByScore(moves, {
      attackWeight: 0.85,
      defenseWeight: 0.75,
      randomness: 160,
      topN: 6
    });
  }

  function getNormalMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    return getBestByScore(moves, {
      attackWeight: 1.05,
      defenseWeight: 1.0,
      randomness: 55,
      topN: 3
    });
  }

  function getHardMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    const aiFour = findThreatMove(WHITE, 4, 1);
    if (aiFour) return aiFour;

    const humanFour = findThreatMove(BLACK, 4, 1);
    if (humanFour) return humanFour;

    const humanOpenThree = findThreatMove(BLACK, 3, 2);
    const aiOpenThree = findThreatMove(WHITE, 3, 2);

    if (aiOpenThree && Math.random() < 0.55) return aiOpenThree;
    if (humanOpenThree) return humanOpenThree;

    return getBestByScore(moves, {
      attackWeight: 1.28,
      defenseWeight: 1.18,
      randomness: 16,
      topN: 2
    });
  }

  function getMasterMove(moves) {
    const ordered = orderMoves(moves, WHITE).slice(0, 18);

    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    const aiFour = findThreatMove(WHITE, 4, 1);
    if (aiFour) return aiFour;

    const humanFour = findThreatMove(BLACK, 4, 1);
    if (humanFour) return humanFour;

    const aiDoubleThreat = findDoubleThreatMove(WHITE);
    if (aiDoubleThreat) return aiDoubleThreat;

    const humanDoubleThreat = findDoubleThreatMove(BLACK);
    if (humanDoubleThreat) return humanDoubleThreat;

    const aiOpenThree = findThreatMove(WHITE, 3, 2);
    if (aiOpenThree) return aiOpenThree;

    const humanOpenThree = findThreatMove(BLACK, 3, 2);
    if (humanOpenThree) return humanOpenThree;

    let bestScore = -Infinity;
    let bestMoves = [];

    for (const move of ordered) {
      board[move.y][move.x] = WHITE;

      if (checkWin(move.x, move.y, WHITE)) {
        board[move.y][move.x] = EMPTY;
        return move;
      }

      const afterAiScore = evaluateWholeBoard(WHITE) - evaluateWholeBoard(BLACK) * 1.18;

      let worstReplyScore = Infinity;
      const replies = orderMoves(getCandidateMoves(2), BLACK).slice(0, 12);

      for (const reply of replies) {
        board[reply.y][reply.x] = BLACK;

        let replyScore;

        if (checkWin(reply.x, reply.y, BLACK)) {
          replyScore = -99999999;
        } else {
          const aiFollowWin = findWinningMove(WHITE);
          const aiThreat = countThreats(WHITE) * 35000;
          const humanThreat = countThreats(BLACK) * 42000;

          replyScore =
            evaluateWholeBoard(WHITE) * 1.18
            - evaluateWholeBoard(BLACK) * 1.36
            + aiThreat
            - humanThreat
            + getCenterBonus(move.x, move.y) * 1.4;

          if (aiFollowWin) {
            replyScore += 600000;
          }
        }

        board[reply.y][reply.x] = EMPTY;

        if (replyScore < worstReplyScore) {
          worstReplyScore = replyScore;
        }
      }

      const score =
        afterAiScore * 0.7
        + worstReplyScore
        + evaluateMoveTactical(move.x, move.y, WHITE) * 2.4
        + evaluateMoveTactical(move.x, move.y, BLACK) * 1.75
        + getCenterBonus(move.x, move.y) * 1.8;

      board[move.y][move.x] = EMPTY;

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [move];
      } else if (Math.abs(score - bestScore) < 0.00001) {
        bestMoves.push(move);
      }
    }

    return bestMoves[Math.floor(Math.random() * bestMoves.length)] || ordered[0] || moves[0];
  }

  function getBestByScore(moves, cfg) {
    const scored = moves.map(function (move) {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluateMoveTactical(move.x, move.y, WHITE) + evaluateWholeBoard(WHITE) * 0.10;
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluateMoveTactical(move.x, move.y, BLACK) + evaluateWholeBoard(BLACK) * 0.10;
      board[move.y][move.x] = EMPTY;

      return {
        move: move,
        score:
          aiScore * cfg.attackWeight
          + humanScore * cfg.defenseWeight
          + getCenterBonus(move.x, move.y)
          + Math.random() * cfg.randomness
      };
    });

    scored.sort(function (a, b) {
      return b.score - a.score;
    });

    const top = scored.slice(0, Math.min(cfg.topN, scored.length));
    return top[Math.floor(Math.random() * top.length)].move;
  }

  function orderMoves(moves, player) {
    return moves
      .map(function (move) {
        board[move.y][move.x] = player;
        const own = evaluateMoveTactical(move.x, move.y, player);
        board[move.y][move.x] = EMPTY;

        const other = player === WHITE ? BLACK : WHITE;
        board[move.y][move.x] = other;
        const opp = evaluateMoveTactical(move.x, move.y, other);
        board[move.y][move.x] = EMPTY;

        return {
          x: move.x,
          y: move.y,
          score: own * 1.2 + opp * 1.05 + getCenterBonus(move.x, move.y)
        };
      })
      .sort(function (a, b) {
        return b.score - a.score;
      });
  }

  function findWinningMove(player) {
    const moves = getCandidateMoves(2);

    for (const move of moves) {
      board[move.y][move.x] = player;
      const win = checkWin(move.x, move.y, player);
      board[move.y][move.x] = EMPTY;

      if (win) return move;
    }

    return null;
  }

  function findThreatMove(player, targetCount, targetOpenEnds) {
    const moves = orderMoves(getCandidateMoves(2), player);

    for (const move of moves) {
      board[move.y][move.x] = player;

      for (const d of [[1,0],[0,1],[1,1],[1,-1]]) {
        const info = getLineInfo(move.x, move.y, d[0], d[1], player);

        if (info.count >= targetCount && info.openEnds >= targetOpenEnds) {
          board[move.y][move.x] = EMPTY;
          return move;
        }
      }

      board[move.y][move.x] = EMPTY;
    }

    return null;
  }

  function findDoubleThreatMove(player) {
    const moves = orderMoves(getCandidateMoves(2), player);

    for (const move of moves) {
      board[move.y][move.x] = player;
      const threats = countMoveThreats(move.x, move.y, player);
      board[move.y][move.x] = EMPTY;

      if (threats >= 2) return move;
    }

    return null;
  }

  function countThreats(player) {
    let total = 0;
    const moves = getCandidateMoves(2);

    for (const move of moves) {
      board[move.y][move.x] = player;
      total += countMoveThreats(move.x, move.y, player);
      board[move.y][move.x] = EMPTY;
    }

    return total;
  }

  function countMoveThreats(x, y, player) {
    let threats = 0;

    for (const d of [[1,0],[0,1],[1,1],[1,-1]]) {
      const info = getLineInfo(x, y, d[0], d[1], player);

      if (info.count >= 4 && info.openEnds >= 1) {
        threats += 2;
      } else if (info.count === 3 && info.openEnds === 2) {
        threats += 1;
      }
    }

    return threats;
  }

  function getLineInfo(x, y, dx, dy, player) {
    let count = 1;
    let openEnds = 0;

    let nx = x + dx;
    let ny = y + dy;

    while (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === player) {
      count++;
      nx += dx;
      ny += dy;
    }

    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === EMPTY) {
      openEnds++;
    }

    nx = x - dx;
    ny = y - dy;

    while (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === player) {
      count++;
      nx -= dx;
      ny -= dy;
    }

    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && board[ny][nx] === EMPTY) {
      openEnds++;
    }

    return { count, openEnds };
  }

  function evaluateMoveTactical(x, y, player) {
    let total = 0;
    let openThreeCount = 0;
    let fourCount = 0;

    for (const d of [[1,0],[0,1],[1,1],[1,-1]]) {
      const info = getLineInfo(x, y, d[0], d[1], player);

      total += patternScore(info.count, info.openEnds);

      if (info.count >= 4 && info.openEnds >= 1) {
        fourCount++;
      }

      if (info.count === 3 && info.openEnds === 2) {
        openThreeCount++;
      }
    }

    if (fourCount >= 2) total += 900000;
    if (fourCount >= 1 && openThreeCount >= 1) total += 520000;
    if (openThreeCount >= 2) total += 320000;

    return total;
  }

  function evaluateWholeBoard(player) {
    let score = 0;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === player) {
          score += evaluateStone(x, y, player);
        }
      }
    }

    return score;
  }

  function evaluateStone(x, y, player) {
    let total = 0;

    for (const d of [[1,0],[0,1],[1,1],[1,-1]]) {
      const info = getLineInfo(x, y, d[0], d[1], player);
      total += patternScore(info.count, info.openEnds) * 0.28;
    }

    return total;
  }

  function patternScore(count, openEnds) {
    if (count >= 5) return 10000000;
    if (count === 4 && openEnds === 2) return 900000;
    if (count === 4 && openEnds === 1) return 130000;
    if (count === 3 && openEnds === 2) return 36000;
    if (count === 3 && openEnds === 1) return 3200;
    if (count === 2 && openEnds === 2) return 900;
    if (count === 2 && openEnds === 1) return 150;
    if (count === 1 && openEnds === 2) return 30;
    return 6;
  }

  function getCenterBonus(x, y) {
    const dx = x - 7;
    const dy = y - 7;
    const dist = Math.sqrt(dx * dx + dy * dy);

    return Math.max(0, 34 - dist * 3.2);
  }

  function startAudio() {
    if (audioStarted) {
      resumeAudio();
      return;
    }

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStarted = true;
      createBackgroundMusic();
    } catch (e) {
      console.log("Audio not supported", e);
    }
  }

  function resumeAudio() {
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume().catch(function () {});
    }
  }

  function getSpeakerSVG(isMuted) {
    const slash = isMuted
      ? '<line x1="18.5" y1="5" x2="5.5" y2="19" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>'
      : "";

    return '' +
      '<svg viewBox="0 0 24 24" aria-hidden="true">' +
        '<path d="M4 9.5H8L13 5.5V18.5L8 14.5H4Z" fill="' + DEEP_BLUE + '" stroke="' + DEEP_BLUE + '" stroke-width="1.7" stroke-linejoin="round"/>' +
        '<path d="M16 8.2C17.2 9.2 17.8 10.5 17.8 12C17.8 13.5 17.2 14.8 16 15.8" fill="none" stroke="' + DEEP_BLUE + '" stroke-width="1.8" stroke-linecap="round"/>' +
        '<path d="M18.6 6.2C20.2 7.8 21 9.7 21 12C21 14.3 20.2 16.2 18.6 17.8" fill="none" stroke="' + DEEP_BLUE + '" stroke-width="1.8" stroke-linecap="round"/>' +
        slash +
      '</svg>';
  }

  function applyBgMuteState() {
    muteBtn.innerHTML = getSpeakerSVG(bgMuted);
    muteBtn.setAttribute("aria-label", bgMuted ? "開啟背景音樂" : "靜音背景音樂");
    muteBtn.title = bgMuted ? "開啟背景音樂" : "靜音背景音樂";

    if (!bgGain || !audioCtx) return;

    const now = audioCtx.currentTime;
    const target = bgMuted ? 0 : 0.035;

    bgGain.gain.cancelScheduledValues(now);
    bgGain.gain.setValueAtTime(bgGain.gain.value, now);
    bgGain.gain.linearRampToValueAtTime(target, now + 0.18);
  }

  function createBackgroundMusic() {
    if (!audioCtx) return;

    bgGain = audioCtx.createGain();
    bgGain.gain.value = bgMuted ? 0 : 0.035;
    bgGain.connect(audioCtx.destination);

    applyBgMuteState();

    const baseNotes = [261.63, 329.63, 392.00, 293.66, 349.23, 440.00];

    baseNotes.forEach(function (freq, index) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = index % 2 === 0 ? "sine" : "triangle";
      osc.frequency.value = freq / (index < 3 ? 2 : 4);
      gain.gain.value = index < 3 ? 0.12 : 0.06;

      osc.connect(gain);
      gain.connect(bgGain);
      osc.start();
    });

    let step = 0;

    setInterval(function () {
      if (!audioCtx || !bgGain) return;
      if (audioCtx.state === "suspended") return;
      if (bgMuted) return;

      const t = audioCtx.currentTime;
      const melody = [523.25, 493.88, 440.00, 392.00, 440.00, 493.88, 587.33, 523.25];

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(melody[step % melody.length], t);

      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.055, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t + 1.7);

      step++;
    }, 1800);
  }

  function playWinSound() {
    if (!audioCtx) return;

    resumeAudio();

    const now = audioCtx.currentTime;
    const masterGain = audioCtx.createGain();

    masterGain.gain.setValueAtTime(0.0001, now);
    masterGain.gain.linearRampToValueAtTime(0.13, now + 0.08);
    masterGain.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
    masterGain.connect(audioCtx.destination);

    const notes = [
      { f: 659.25, t: 0.00 },
      { f: 783.99, t: 0.16 },
      { f: 987.77, t: 0.34 },
      { f: 1174.66, t: 0.58 },
      { f: 1567.98, t: 0.92 }
    ];

    notes.forEach(function (note, i) {
      const t = now + note.t;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(note.f, t);
      osc.frequency.exponentialRampToValueAtTime(note.f * 1.015, t + 0.42);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(i === 4 ? 0.06 : 0.08, t + 0.035);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.78);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(t);
      osc.stop(t + 0.82);
    });

    [1318.51, 1760.00, 2093.00, 2637.02].forEach(function (freq, i) {
      const t = now + 0.18 + i * 0.18;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, t);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.032, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(t);
      osc.stop(t + 0.55);
    });
  }

  function startPersistentFireworks() {
    stopPersistentFireworks();
    createFireworksAroundResult();

    persistentFireworkTimer = setInterval(function () {
      if (!resultModal.classList.contains("active")) return;
      createFireworksAroundResult();
    }, 720);
  }

  function stopPersistentFireworks() {
    if (persistentFireworkTimer) {
      clearInterval(persistentFireworkTimer);
      persistentFireworkTimer = null;
    }

    fireworkLayer.innerHTML = "";
  }

  function createFireworksAroundResult() {
    const cardRect = resultCard.getBoundingClientRect();
    const gameRect = gameScreen.getBoundingClientRect();

    const points = [
      { x: cardRect.left - gameRect.left + cardRect.width * 0.10, y: cardRect.top - gameRect.top + cardRect.height * 0.12 },
      { x: cardRect.left - gameRect.left + cardRect.width * 0.90, y: cardRect.top - gameRect.top + cardRect.height * 0.14 },
      { x: cardRect.left - gameRect.left + cardRect.width * 0.08, y: cardRect.top - gameRect.top + cardRect.height * 0.86 },
      { x: cardRect.left - gameRect.left + cardRect.width * 0.92, y: cardRect.top - gameRect.top + cardRect.height * 0.82 },
      { x: cardRect.left - gameRect.left + cardRect.width * 0.50, y: cardRect.top - gameRect.top - 14 },
      { x: cardRect.left - gameRect.left + cardRect.width * 0.50, y: cardRect.bottom - gameRect.top + 12 }
    ];

    const pickCount = 3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < pickCount; i++) {
      const p = points[Math.floor(Math.random() * points.length)];

      setTimeout(function () {
        createFireworkBurst(p.x, p.y, 12 + Math.floor(Math.random() * 8), 42 + Math.random() * 28);
      }, i * 110);
    }
  }

  function createFireworkBurst(cx, cy, count, baseDistance) {
    count = count || 20;
    baseDistance = baseDistance || 60;

    for (let i = 0; i < count; i++) {
      const spark = document.createElement("div");
      spark.className = "spark";

      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.35;
      const distance = baseDistance * 0.55 + Math.random() * baseDistance;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;

      spark.style.left = cx + "px";
      spark.style.top = cy + "px";
      spark.style.setProperty("--dx", dx + "px");
      spark.style.setProperty("--dy", dy + "px");

      if (i % 4 === 0) {
        spark.style.background = "rgba(255, 250, 224, 0.98)";
      } else if (i % 4 === 1) {
        spark.style.background = "rgba(210, 232, 255, 0.98)";
      } else if (i % 4 === 2) {
        spark.style.background = "rgba(235, 215, 255, 0.98)";
      } else {
        spark.style.background = "rgba(255, 246, 255, 0.98)";
      }

      fireworkLayer.appendChild(spark);

      setTimeout(function () {
        spark.remove();
      }, 1250);
    }
  }

  function createDust() {
    const dust = document.createElement("div");
    dust.className = "magic-dust";

    const x = Math.random() * window.innerWidth;
    const y = window.innerHeight * (0.55 + Math.random() * 0.4);

    dust.style.left = x + "px";
    dust.style.top = y + "px";
    dust.style.opacity = Math.random() * 0.8 + 0.2;

    document.getElementById("app").appendChild(dust);

    setTimeout(function () {
      dust.remove();
    }, 3600);
  }

  setInterval(createDust, 380);

  updateModeButtons();
  resizeCanvas();
  applyBgMuteState();
})();
</script>
