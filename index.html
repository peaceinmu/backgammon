<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>慢慢五子棋</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    overflow: hidden;
    font-family:
      "Noto Serif TC",
      "PingFang TC",
      "Microsoft JhengHei",
      serif;
    color: #f6f1ff;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.30), transparent 18%),
      radial-gradient(circle at 80% 20%, rgba(210,190,255,0.24), transparent 22%),
      linear-gradient(160deg, #5365a8 0%, #7b65b6 42%, #b79bdc 100%);
  }

  #app {
    width: 100vw;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .background {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(70,88,150,0.18), rgba(33,32,68,0.62)),
      url("data:image/svg+xml,%3Csvg width='1200' height='900' viewBox='0 0 1200 900' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop stop-color='%23dfe8ff' offset='0'/%3E%3Cstop stop-color='%238b8ed8' offset='0.45'/%3E%3Cstop stop-color='%233b3574' offset='1'/%3E%3C/linearGradient%3E%3Cfilter id='blur'%3E%3CfeGaussianBlur stdDeviation='1.8'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='1200' height='900' fill='url(%23g)'/%3E%3Cpath d='M0 570 C180 480 280 530 420 440 C600 320 760 430 900 330 C1050 220 1140 300 1200 250 L1200 900 L0 900 Z' fill='%236e75bb' opacity='0.70'/%3E%3Cpath d='M0 680 C170 560 310 650 460 540 C650 400 760 560 930 430 C1060 330 1130 390 1200 350 L1200 900 L0 900 Z' fill='%235b58a2' opacity='0.82'/%3E%3Cpath d='M0 760 C220 650 360 760 520 640 C710 500 850 670 1010 520 C1120 420 1170 470 1200 440 L1200 900 L0 900 Z' fill='%232f2d67' opacity='0.88'/%3E%3Ccircle cx='210' cy='140' r='4' fill='%23fff8d6' opacity='0.85'/%3E%3Ccircle cx='950' cy='110' r='3' fill='%23fff8d6' opacity='0.75'/%3E%3Ccircle cx='720' cy='190' r='2.5' fill='%23fff8d6' opacity='0.72'/%3E%3Ccircle cx='540' cy='100' r='2' fill='%23fff8d6' opacity='0.75'/%3E%3Ccircle cx='340' cy='210' r='2.5' fill='%23f5dcff' opacity='0.72'/%3E%3Ccircle cx='1080' cy='200' r='2.5' fill='%23f5dcff' opacity='0.68'/%3E%3Cpath d='M160 650 C150 530 170 430 210 350 C248 445 260 540 250 670' fill='%232d2c63' opacity='0.52' filter='url(%23blur)'/%3E%3Cpath d='M1040 680 C1010 520 1040 390 1100 300 C1150 420 1160 560 1130 700' fill='%232d2c63' opacity='0.45' filter='url(%23blur)'/%3E%3C/svg%3E");
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .mist {
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,0.20), transparent 26%),
      radial-gradient(circle at 70% 30%, rgba(224,205,255,0.20), transparent 28%),
      radial-gradient(circle at 50% 80%, rgba(186,215,255,0.16), transparent 35%);
    animation: drift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes drift {
    from { transform: translateX(-2%) translateY(1%); }
    to { transform: translateX(2%) translateY(-1%); }
  }

  .screen {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: none;
  }

  .screen.active {
    display: flex;
  }

  #menuScreen {
    align-items: center;
    justify-content: center;
    padding: 22px;
  }

  .menu-scene {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .moon {
    position: absolute;
    top: 4.5vh;
    right: 8vw;
    width: clamp(48px, 10vw, 86px);
    height: clamp(48px, 10vw, 86px);
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, #fffaf0 0%, #f6e7ff 44%, #d8c2ff 72%, rgba(216,194,255,0.7) 100%);
    box-shadow:
      0 0 20px rgba(255, 243, 255, 0.95),
      0 0 42px rgba(226, 205, 255, 0.82),
      0 0 72px rgba(164, 189, 255, 0.46);
    opacity: 0.96;
  }

  .moon::after {
    content: "";
    position: absolute;
    width: 78%;
    height: 78%;
    border-radius: 50%;
    right: -15%;
    top: 6%;
    background: rgba(87, 77, 157, 0.56);
    filter: blur(1px);
  }

  .star {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #fff8db;
    border-radius: 50%;
    box-shadow:
      0 0 8px rgba(255, 248, 219, 1),
      0 0 18px rgba(232, 207, 255, 0.9);
    animation: twinkle 2.8s ease-in-out infinite alternate;
  }

  .star::before,
  .star::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    background: rgba(255, 248, 219, 0.9);
    transform: translate(-50%, -50%);
    border-radius: 999px;
  }

  .star::before {
    width: 18px;
    height: 1px;
  }

  .star::after {
    width: 1px;
    height: 18px;
  }

  .star.s1 { top: 15vh; left: 16vw; animation-delay: 0s; }
  .star.s2 { top: 19vh; left: 76vw; animation-delay: 0.6s; transform: scale(0.72); }
  .star.s3 { top: 34vh; left: 11vw; animation-delay: 1.2s; transform: scale(0.58); }
  .star.s4 { top: 12vh; left: 47vw; animation-delay: 1.7s; transform: scale(0.82); }
  .star.s5 { top: 42vh; left: 82vw; animation-delay: 0.9s; transform: scale(0.55); }

  @keyframes twinkle {
    from { opacity: 0.45; filter: blur(0.2px); }
    to { opacity: 1; filter: blur(0); }
  }

  .menu-mountains {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 36vh;
    background:
      url("data:image/svg+xml,%3Csvg width='1200' height='340' viewBox='0 0 1200 340' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 250 L120 150 L220 225 L350 95 L500 230 L640 125 L790 235 L935 80 L1080 225 L1200 130 L1200 340 L0 340 Z' fill='%232a2b69' opacity='0.72'/%3E%3Cpath d='M0 285 L150 195 L280 260 L415 150 L570 275 L710 178 L850 268 L1010 145 L1200 260 L1200 340 L0 340 Z' fill='%233d3b8c' opacity='0.58'/%3E%3Cpath d='M0 315 C160 265 260 310 420 255 C590 198 740 290 910 230 C1040 185 1140 230 1200 205 L1200 340 L0 340 Z' fill='%231f2257' opacity='0.78'/%3E%3C/svg%3E");
    background-size: cover;
    background-position: bottom center;
    opacity: 0.95;
  }

  .menu-card {
    position: relative;
    z-index: 2;
    width: min(480px, 94vw);
    padding: 26px 22px;
    border: none;
    border-radius: 28px;
    background:
      linear-gradient(180deg, rgba(74, 66, 142, 0.72), rgba(38, 35, 88, 0.84));
    box-shadow:
      0 22px 60px rgba(0, 0, 0, 0.32),
      inset 0 0 45px rgba(225, 211, 255, 0.10);
    backdrop-filter: blur(12px);
    text-align: center;
  }

  .title {
    margin: 0;
    font-size: clamp(34px, 8vw, 56px);
    letter-spacing: 0.12em;
    font-weight: 700;
    color: #fff0ff;
    text-shadow:
      0 0 14px rgba(220, 195, 255, 0.8),
      0 4px 10px rgba(0,0,0,0.45);
  }

  .subtitle {
    margin: 12px 0 20px;
    color: #eee7ff;
    line-height: 1.7;
    font-size: 15px;
  }

  .section-title {
    margin: 16px 0 9px;
    color: #ffeaff;
    font-size: 15px;
    letter-spacing: 0.12em;
  }

  .choice-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .choice-btn,
  .main-btn,
  .small-btn {
    border: none;
    outline: none;
    color: #f8efff;
    background:
      linear-gradient(180deg, rgba(128, 112, 200, 0.72), rgba(78, 70, 156, 0.78));
    border-radius: 999px;
    padding: 11px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.16);
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .choice-btn:hover,
  .main-btn:hover,
  .small-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 26px rgba(0,0,0,0.22);
  }

  .choice-btn.selected {
    background:
      linear-gradient(180deg, rgba(245, 226, 255, 0.98), rgba(177, 145, 232, 0.92));
    color: #2f2d66;
  }

  .main-btn {
    width: min(300px, 80vw);
    margin-top: 24px;
    padding: 14px 20px;
    font-size: 18px;
    background:
      linear-gradient(180deg, #f2dcff, #a98be4);
    color: #302c66;
  }

  .hint {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(242, 235, 255, 0.78);
    line-height: 1.6;
  }

  #gameScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
  }

  .game-glyph {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: min(520px, 88vw);
    height: 82px;
    z-index: 3;
    pointer-events: none;
    opacity: 0.36;
    background:
      url("data:image/svg+xml,%3Csvg width='700' height='110' viewBox='0 0 700 110' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23fff1ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M60 55 C120 18 180 18 240 55 C300 92 400 92 460 55 C520 18 580 18 640 55' opacity='.8'/%3E%3Ccircle cx='350' cy='55' r='28'/%3E%3Ccircle cx='350' cy='55' r='12'/%3E%3Cpath d='M350 18 L350 92 M313 55 L387 55'/%3E%3Cpath d='M130 55 C145 35 165 35 180 55 C165 75 145 75 130 55 Z'/%3E%3Cpath d='M520 55 C535 35 555 35 570 55 C555 75 535 75 520 55 Z'/%3E%3Cpath d='M75 38 L92 55 L75 72 M625 38 L608 55 L625 72'/%3E%3C/g%3E%3C/svg%3E");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    filter: drop-shadow(0 0 9px rgba(232,210,255,0.55));
  }

  .game-glyph.top {
    top: calc(env(safe-area-inset-top) + 56px);
  }

  .game-glyph.bottom {
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    transform: translateX(-50%) rotate(180deg);
  }

  .topbar {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 10px);
    left: 10px;
    right: 10px;
    min-height: 58px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    z-index: 4;
  }

  .status-panel {
    min-width: 0;
    padding: 9px 12px;
    border-radius: 18px;
    background: rgba(48, 43, 108, 0.68);
    border: none;
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 10px 26px rgba(0,0,0,0.18);
  }

  #statusText {
    font-size: clamp(14px, 3.6vw, 18px);
    color: #fff0ff;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #modeText {
    margin-top: 4px;
    font-size: 12px;
    color: rgba(240,232,255,0.80);
  }

  .small-btn {
    padding: 9px 13px;
    font-size: 13px;
    background: rgba(68, 59, 148, 0.72);
    backdrop-filter: blur(8px);
  }

  .board-wrap {
    position: relative;
    width: min(92vw, 82dvh, 720px);
    height: min(92vw, 82dvh, 720px);
    margin-top: 58px;
    border-radius: 24px;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.28), transparent 20%),
      linear-gradient(135deg, rgba(202, 186, 255, 0.96), rgba(121, 111, 206, 0.96));
    border: 2px solid rgba(236, 220, 255, 0.50);
    box-shadow:
      0 28px 70px rgba(0,0,0,0.42),
      inset 0 0 35px rgba(255,255,255,0.22),
      inset 0 0 85px rgba(58, 46, 117,0.36);
    overflow: hidden;
    z-index: 4;
  }

  .board-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.10), transparent 24%, rgba(59,45,118,0.09) 50%, transparent 76%, rgba(255,255,255,0.08)),
      repeating-linear-gradient(90deg, rgba(70,55,130,0.05) 0 5px, transparent 5px 15px);
    pointer-events: none;
  }

  .board-wrap::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 18px;
    pointer-events: none;
    opacity: 0.35;
    background:
      url("data:image/svg+xml,%3Csvg width='640' height='640' viewBox='0 0 640 640' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23fff1ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M54 92 C92 62 135 64 160 96 C129 93 100 107 78 134' opacity='0.95'/%3E%3Cpath d='M64 132 C106 118 138 130 162 164' opacity='0.75'/%3E%3Cpath d='M586 92 C548 62 505 64 480 96 C511 93 540 107 562 134' opacity='0.95'/%3E%3Cpath d='M576 132 C534 118 502 130 478 164' opacity='0.75'/%3E%3Cpath d='M54 548 C92 578 135 576 160 544 C129 547 100 533 78 506' opacity='0.95'/%3E%3Cpath d='M64 508 C106 522 138 510 162 476' opacity='0.75'/%3E%3Cpath d='M586 548 C548 578 505 576 480 544 C511 547 540 533 562 506' opacity='0.95'/%3E%3Cpath d='M576 508 C534 522 502 510 478 476' opacity='0.75'/%3E%3Ccircle cx='90' cy='90' r='8'/%3E%3Ccircle cx='550' cy='90' r='8'/%3E%3Ccircle cx='90' cy='550' r='8'/%3E%3Ccircle cx='550' cy='550' r='8'/%3E%3Cpath d='M320 42 C334 58 334 74 320 90 C306 74 306 58 320 42 Z' opacity='0.72'/%3E%3Cpath d='M320 598 C334 582 334 566 320 550 C306 566 306 582 320 598 Z' opacity='0.72'/%3E%3Cpath d='M42 320 C58 306 74 306 90 320 C74 334 58 334 42 320 Z' opacity='0.72'/%3E%3Cpath d='M598 320 C582 306 566 306 550 320 C566 334 582 334 598 320 Z' opacity='0.72'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    z-index: 1;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    z-index: 2;
  }

  .spell-ring {
    position: absolute;
    width: 120px;
    height: 120px;
    pointer-events: none;
    border-radius: 50%;
    border: 1px solid rgba(246, 224, 255, 0.9);
    box-shadow:
      0 0 18px rgba(229, 202, 255, 0.9),
      inset 0 0 20px rgba(255,255,255,0.30);
    transform: translate(-50%, -50%) scale(0.2);
    opacity: 0;
    z-index: 5;
  }

  .spell-ring.show {
    animation: ring 0.45s ease-out forwards;
  }

  @keyframes ring {
    0% {
      opacity: 0.95;
      transform: translate(-50%, -50%) scale(0.15) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.15) rotate(35deg);
    }
  }

  .firework-layer {
    position: absolute;
    inset: 0;
    z-index: 7;
    pointer-events: none;
    overflow: hidden;
  }

  .spark {
    position: absolute;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255, 238, 255, 0.96);
    box-shadow:
      0 0 8px rgba(255, 238, 255, 0.9),
      0 0 18px rgba(220, 195, 255, 0.7);
    transform: translate(-50%, -50%);
    animation: sparkleFly 900ms ease-out forwards;
  }

  @keyframes sparkleFly {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(0.55);
    }
    75% {
      opacity: 0.95;
    }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--dx)), calc(-50% + var(--dy)))
        scale(0.1);
    }
  }

  .result-modal {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(16, 16, 44, 0.20);
    backdrop-filter: blur(3px);
    padding: 22px;
  }

  .result-modal.active {
    display: flex;
  }

  .result-card {
    width: min(360px, 88vw);
    padding: 26px 20px;
    border-radius: 26px;
    background:
      linear-gradient(180deg, rgba(84, 72, 160, 0.88), rgba(43, 38, 102, 0.92));
    border: none;
    text-align: center;
    box-shadow: 0 24px 70px rgba(0,0,0,0.36);
  }

  #resultTitle {
    margin: 0;
    color: #fff0ff;
    font-size: 32px;
    text-shadow: 0 0 16px rgba(226,205,255,0.65);
  }

  #resultDesc {
    display: none;
  }

  .bottom-note {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    left: 12px;
    right: 12px;
    text-align: center;
    color: rgba(246,238,255,0.72);
    font-size: 12px;
    z-index: 4;
    pointer-events: none;
  }

  .magic-dust {
    position: absolute;
    width: 5px;
    height: 5px;
    background: rgba(238, 216, 255, 0.88);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(238, 216, 255, 0.95);
    animation: floatUp 3.5s linear forwards;
    z-index: 3;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translateY(-90px) scale(1.15); opacity: 0; }
  }

  @media (max-width: 720px) {
    #gameScreen {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .topbar {
      top: calc(env(safe-area-inset-top) + 6px);
      left: 6px;
      right: 6px;
      grid-template-columns: 64px 1fr 64px;
    }

    .small-btn {
      padding: 8px 8px;
      font-size: 12px;
    }

    .board-wrap {
      width: min(100vw, calc(100dvh - 120px));
      height: min(100vw, calc(100dvh - 120px));
      border-radius: 18px;
      margin-top: 52px;
    }

    .menu-card {
      padding: 24px 18px;
    }

    .choice-btn {
      min-width: 82px;
      padding: 10px 14px;
    }

    .bottom-note {
      display: none;
    }

    .moon {
      top: 4vh;
      right: 6vw;
      width: 52px;
      height: 52px;
    }

    .menu-mountains {
      height: 30vh;
    }

    .game-glyph.top {
      top: calc(env(safe-area-inset-top) + 62px);
    }

    .game-glyph.bottom {
      bottom: calc(env(safe-area-inset-bottom) + 4px);
      height: 62px;
    }
  }

  @media (orientation: landscape) and (max-height: 520px) {
    .topbar {
      grid-template-columns: 76px 1fr 76px;
      min-height: 46px;
    }

    .status-panel {
      padding: 6px 10px;
    }

    #modeText {
      display: none;
    }

    .board-wrap {
      margin-top: 46px;
      width: min(82vh, 72vw);
      height: min(82vh, 72vw);
    }

    .moon {
      top: 5vh;
      right: 6vw;
      width: 46px;
      height: 46px;
    }

    .menu-mountains {
      height: 24vh;
    }

    .game-glyph {
      display: none;
    }
  }
</style>
</head>

<body>
<div id="app">
  <div class="background"></div>
  <div class="mist"></div>

  <section id="menuScreen" class="screen active">
    <div class="menu-scene">
      <div class="moon"></div>
      <div class="star s1"></div>
      <div class="star s2"></div>
      <div class="star s3"></div>
      <div class="star s4"></div>
      <div class="star s5"></div>
      <div class="menu-mountains"></div>
    </div>

    <div class="menu-card">
      <h1 class="title">慢慢五子棋</h1>
      <p class="subtitle">
        在藍紫色的星霧森林裡，<br>
        慢慢思考，安靜對弈。
      </p>

      <div class="section-title">模式</div>
      <div class="choice-row">
        <button class="choice-btn selected" data-mode="ai">和電腦對戰</button>
        <button class="choice-btn" data-mode="pvp">兩人對戰</button>
      </div>

      <div class="section-title">難度</div>
      <div class="choice-row">
        <button class="choice-btn" data-difficulty="easy">簡單</button>
        <button class="choice-btn selected" data-difficulty="normal">普通</button>
        <button class="choice-btn" data-difficulty="hard">困難</button>
        <button class="choice-btn" data-difficulty="master">大師</button>
      </div>

      <button id="startBtn" class="main-btn">開始遊戲</button>

      <div class="hint">
        手機與電腦皆可遊玩。<br>
        黑棋先手，先連成五子者獲勝。
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="game-glyph top"></div>
    <div class="game-glyph bottom"></div>
    <div id="fireworkLayer" class="firework-layer"></div>

    <div class="topbar">
      <button id="backBtn" class="small-btn">選單</button>
      <div class="status-panel">
        <div id="statusText">黑棋回合</div>
        <div id="modeText">和電腦對戰｜普通</div>
      </div>
      <button id="restartBtn" class="small-btn">重開</button>
    </div>

    <div id="boardWrap" class="board-wrap">
      <canvas id="boardCanvas"></canvas>
      <div id="spellRing" class="spell-ring"></div>
    </div>

    <div class="bottom-note">
      背景樂會在第一次點擊後啟動。若手機靜音，請關閉靜音模式。
    </div>

    <div id="resultModal" class="result-modal">
      <div class="result-card">
        <h2 id="resultTitle">黑棋勝利</h2>
        <div id="resultDesc"></div>
        <button id="againBtn" class="main-btn">再來一局</button>
        <button id="menuBtn" class="small-btn" style="margin-top:12px;">回到選單</button>
      </div>
    </div>
  </section>
</div>

<script>
(() => {
  const SIZE = 15;
  const EMPTY = 0;
  const BLACK = 1;
  const WHITE = 2;

  const menuScreen = document.getElementById("menuScreen");
  const gameScreen = document.getElementById("gameScreen");
  const boardWrap = document.getElementById("boardWrap");
  const canvas = document.getElementById("boardCanvas");
  const ctx = canvas.getContext("2d");

  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");
  const restartBtn = document.getElementById("restartBtn");
  const againBtn = document.getElementById("againBtn");
  const menuBtn = document.getElementById("menuBtn");

  const statusText = document.getElementById("statusText");
  const modeText = document.getElementById("modeText");
  const resultModal = document.getElementById("resultModal");
  const resultTitle = document.getElementById("resultTitle");
  const spellRing = document.getElementById("spellRing");
  const fireworkLayer = document.getElementById("fireworkLayer");

  let board = [];
  let currentPlayer = BLACK;
  let gameOver = false;
  let mode = "ai";
  let difficulty = "normal";
  let cell = 0;
  let margin = 0;
  let lastMove = null;
  let audioStarted = false;
  let bgGain = null;
  let audioCtx = null;
  let bgOscillators = [];

  function initBoard() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
    currentPlayer = BLACK;
    gameOver = false;
    lastMove = null;
    fireworkLayer.innerHTML = "";
    resultModal.classList.remove("active");
    updateStatus();
    resizeCanvas();
  }

  function showScreen(name) {
    menuScreen.classList.remove("active");
    gameScreen.classList.remove("active");

    if (name === "menu") {
      menuScreen.classList.add("active");
    } else {
      gameScreen.classList.add("active");
    }
  }

  document.querySelectorAll("[data-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      mode = btn.dataset.mode;
      document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      updateModeButtons();
    });
  });

  document.querySelectorAll("[data-difficulty]").forEach(btn => {
    btn.addEventListener("click", () => {
      difficulty = btn.dataset.difficulty;
      document.querySelectorAll("[data-difficulty]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    });
  });

  function updateModeButtons() {
    const difficultyButtons = document.querySelectorAll("[data-difficulty]");
    difficultyButtons.forEach(btn => {
      btn.disabled = mode === "pvp";
      btn.style.opacity = mode === "pvp" ? "0.45" : "1";
    });
  }

  startBtn.addEventListener("click", () => {
    startAudio();
    showScreen("game");
    initBoard();
  });

  backBtn.addEventListener("click", () => {
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  restartBtn.addEventListener("click", () => {
    startAudio();
    initBoard();
  });

  againBtn.addEventListener("click", () => {
    startAudio();
    initBoard();
  });

  menuBtn.addEventListener("click", () => {
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  function updateStatus() {
    if (gameOver) return;

    const playerName = currentPlayer === BLACK ? "黑棋" : "白棋";

    if (mode === "ai") {
      if (currentPlayer === BLACK) {
        statusText.textContent = "你的回合｜黑棋";
      } else {
        statusText.textContent = "電腦思考中｜白棋";
      }
      modeText.textContent = `和電腦對戰｜${difficultyName(difficulty)}`;
    } else {
      statusText.textContent = `${playerName}回合`;
      modeText.textContent = "兩人對戰";
    }
  }

  function difficultyName(value) {
    if (value === "easy") return "簡單";
    if (value === "hard") return "困難";
    if (value === "master") return "大師";
    return "普通";
  }

  function resizeCanvas() {
    const rect = boardWrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    margin = rect.width * 0.065;
    cell = (rect.width - margin * 2) / (SIZE - 1);

    drawBoard();
  }

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("orientationchange", () => {
    setTimeout(resizeCanvas, 250);
  });

  function drawBoard() {
    const w = boardWrap.getBoundingClientRect().width;
    const h = boardWrap.getBoundingClientRect().height;

    ctx.clearRect(0, 0, w, h);

    drawDreamTexture(w, h);
    drawSoftVines(w, h);
    drawMagicCorners(w, h);
    drawGrid(w, h);
    drawStarPoints();
    drawPieces();

    if (lastMove) {
      drawLastMove(lastMove.x, lastMove.y);
    }
  }

  function drawDreamTexture(w, h) {
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, "rgba(239, 224, 255, 0.58)");
    grad.addColorStop(0.45, "rgba(180, 158, 244, 0.44)");
    grad.addColorStop(1, "rgba(101, 83, 184, 0.46)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = 0.24;

    for (let i = 0; i < 28; i++) {
      ctx.beginPath();
      const y = (h / 28) * i + Math.sin(i) * 8;
      ctx.moveTo(0, y);
      for (let x = 0; x <= w; x += 40) {
        ctx.lineTo(x, y + Math.sin(x * 0.025 + i) * 8);
      }
      ctx.strokeStyle = i % 2 ? "#6552b2" : "#f7e8ff";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    for (let i = 0; i < 14; i++) {
      const x = (i * 47) % w;
      const y = (i * 83) % h;
      const r = (i % 4 + 1) * cell * 0.06;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 245, 255, 0.13)";
      ctx.fill();
    }

    ctx.restore();
  }

  function drawSoftVines(w, h) {
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = "rgba(255, 240, 255, 0.72)";
    ctx.lineWidth = 1.6;
    ctx.lineCap = "round";

    drawVine(26, h * 0.22, 1);
    drawVine(w - 26, h * 0.78, -1);

    ctx.restore();

    function drawVine(startX, startY, dir) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);

      for (let i = 0; i < 7; i++) {
        const x = startX + dir * (18 + i * 13);
        const y = startY + Math.sin(i * 0.9) * 24 + i * 18 * (startY < h / 2 ? 1 : -1);
        ctx.quadraticCurveTo(
          startX + dir * (22 + i * 12),
          y - 15,
          x,
          y
        );

        if (i % 2 === 0) {
          drawLeaf(x, y, dir);
        }
      }

      ctx.stroke();
    }

    function drawLeaf(x, y, dir) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(dir * 0.8);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(dir * 12, -8, dir * 22, 0);
      ctx.quadraticCurveTo(dir * 12, 8, 0, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawMagicCorners(w, h) {
    ctx.save();
    ctx.globalAlpha = 0.46;
    ctx.strokeStyle = "rgba(246, 224, 255, 0.78)";
    ctx.lineWidth = 1.2;

    const r = w * 0.09;
    const gap = w * 0.035;

    [[gap, gap], [w - gap, gap], [gap, h - gap], [w - gap, h - gap]].forEach(([x, y], index) => {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
      ctx.stroke();

      for (let a = 0; a < 6; a++) {
        const angle = (Math.PI * 2 / 6) * a + index * 0.2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
        ctx.stroke();
      }
    });

    ctx.restore();
  }

  function drawGrid() {
    ctx.save();
    ctx.strokeStyle = "rgba(54, 43, 108, 0.82)";
    ctx.lineWidth = 1.2;

    for (let i = 0; i < SIZE; i++) {
      const p = margin + i * cell;

      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(margin + cell * (SIZE - 1), p);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, margin + cell * (SIZE - 1));
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawStarPoints() {
    const points = [
      [3,3], [7,3], [11,3],
      [3,7], [7,7], [11,7],
      [3,11], [7,11], [11,11]
    ];

    ctx.save();

    points.forEach(([x, y]) => {
      const px = margin + x * cell;
      const py = margin + y * cell;

      ctx.beginPath();
      ctx.arc(px, py, Math.max(3, cell * 0.09), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(61, 46, 120, 0.86)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, py, Math.max(8, cell * 0.2), 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255, 236, 255, 0.34)";
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    ctx.restore();
  }

  function drawPieces() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          drawPiece(x, y, board[y][x]);
        }
      }
    }
  }

  function drawPiece(x, y, player) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.38;

    ctx.save();

    ctx.beginPath();
    ctx.arc(px + r * 0.18, py + r * 0.22, r * 1.02, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.23)";
    ctx.fill();

    const grad = ctx.createRadialGradient(
      px - r * 0.35, py - r * 0.35, r * 0.15,
      px, py, r
    );

    if (player === BLACK) {
      grad.addColorStop(0, "#74708e");
      grad.addColorStop(0.35, "#282642");
      grad.addColorStop(1, "#090814");
    } else {
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#f5edff");
      grad.addColorStop(1, "#bca9e8");
    }

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px - r * 0.28, py - r * 0.28, r * 0.17, 0, Math.PI * 2);
    ctx.fillStyle = player === BLACK
      ? "rgba(255,245,255,0.28)"
      : "rgba(255,255,255,0.78)";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = player === BLACK
      ? "rgba(238,220,255,0.24)"
      : "rgba(72,58,130,0.36)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  function drawLastMove(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.17;

    ctx.save();

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255, 232, 255, 0.96)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, r * 0.32, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 232, 255, 0.96)";
    ctx.fill();

    ctx.restore();
  }

  function getBoardPosition(evt) {
    const rect = canvas.getBoundingClientRect();
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;

    const x = Math.round((clientX - rect.left - margin) / cell);
    const y = Math.round((clientY - rect.top - margin) / cell);

    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return null;

    const px = margin + x * cell;
    const py = margin + y * cell;
    const dx = clientX - rect.left - px;
    const dy = clientY - rect.top - py;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > cell * 0.52) return null;

    return { x, y };
  }

  canvas.addEventListener("pointerdown", (evt) => {
    evt.preventDefault();
    startAudio();

    if (gameOver) return;
    if (mode === "ai" && currentPlayer === WHITE) return;

    const pos = getBoardPosition(evt);
    if (!pos) return;

    placeMove(pos.x, pos.y, currentPlayer);
  });

  function placeMove(x, y, player) {
    if (board[y][x] !== EMPTY || gameOver) return false;

    board[y][x] = player;
    lastMove = { x, y };

    showSpellAt(x, y);
    drawBoard();

    if (checkWin(x, y, player)) {
      endGame(player);
      return true;
    }

    if (isBoardFull()) {
      endDraw();
      return true;
    }

    currentPlayer = player === BLACK ? WHITE : BLACK;
    updateStatus();

    if (mode === "ai" && currentPlayer === WHITE && !gameOver) {
      setTimeout(aiTurn, difficulty === "master" ? 260 : 350);
    }

    return true;
  }

  function showSpellAt(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;

    spellRing.style.left = px + "px";
    spellRing.style.top = py + "px";
    spellRing.classList.remove("show");
    void spellRing.offsetWidth;
    spellRing.classList.add("show");
  }

  function checkWin(x, y, player) {
    const dirs = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    for (const [dx, dy] of dirs) {
      let count = 1;
      count += countDirection(x, y, dx, dy, player);
      count += countDirection(x, y, -dx, -dy, player);
      if (count >= 5) return true;
    }

    return false;
  }

  function countDirection(x, y, dx, dy, player) {
    let count = 0;
    let nx = x + dx;
    let ny = y + dy;

    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx += dx;
      ny += dy;
    }

    return count;
  }

  function isBoardFull() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === EMPTY) return false;
      }
    }
    return true;
  }

  function endGame(player) {
    gameOver = true;
    playWinSound();
    launchMagicFireworks();

    const winner = player === BLACK ? "黑棋" : "白棋";

    if (mode === "ai") {
      resultTitle.textContent = player === BLACK ? "你贏了！" : "電腦勝利";
    } else {
      resultTitle.textContent = `${winner}勝利`;
    }

    statusText.textContent = `${winner}勝利`;

    setTimeout(() => {
      resultModal.classList.add("active");
    }, 760);
  }

  function endDraw() {
    gameOver = true;
    resultTitle.textContent = "平手";
    statusText.textContent = "平手";
    setTimeout(() => {
      resultModal.classList.add("active");
    }, 450);
  }

  function aiTurn() {
    if (gameOver) return;

    const move = getAIMove();
    if (move) {
      placeMove(move.x, move.y, WHITE);
    }
  }

  function getAIMove() {
    const moves = getCandidateMoves();

    if (moves.length === 0) {
      return { x: 7, y: 7 };
    }

    if (difficulty === "easy") {
      return getEasyMove(moves);
    }

    if (difficulty === "normal") {
      return getNormalMove(moves);
    }

    if (difficulty === "master") {
      return getMasterMove(moves);
    }

    return getHardMove(moves);
  }

  function getCandidateMoves() {
    const candidates = [];
    const seen = new Set();
    let hasStone = false;

    const radius = difficulty === "master" ? 2 : 2;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          hasStone = true;

          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const nx = x + dx;
              const ny = y + dy;

              if (
                nx >= 0 && nx < SIZE &&
                ny >= 0 && ny < SIZE &&
                board[ny][nx] === EMPTY
              ) {
                const key = nx + "," + ny;
                if (!seen.has(key)) {
                  seen.add(key);
                  candidates.push({ x: nx, y: ny });
                }
              }
            }
          }
        }
      }
    }

    if (!hasStone) return [{ x: 7, y: 7 }];

    return candidates;
  }

  function getEasyMove(moves) {
    if (Math.random() < 0.32) {
      return moves[Math.floor(Math.random() * moves.length)];
    }

    return getBestByScore(moves, 0.9);
  }

  function getNormalMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    return getBestByScore(moves, 0.75);
  }

  function getHardMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    let bestScore = -Infinity;
    let bestMoves = [];

    for (const move of moves) {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluateBoard(WHITE);
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluateBoard(BLACK);
      board[move.y][move.x] = EMPTY;

      const centerBonus = getCenterBonus(move.x, move.y);
      const score = aiScore * 1.18 + humanScore * 1.04 + centerBonus;

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [move];
      } else if (score === bestScore) {
        bestMoves.push(move);
      }
    }

    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  function getMasterMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    const humanOpenFour = findStrongThreat(BLACK, 4, 1);
    if (humanOpenFour) return humanOpenFour;

    const aiOpenThree = findStrongThreat(WHITE, 3, 2);
    const humanOpenThree = findStrongThreat(BLACK, 3, 2);

    if (aiOpenThree && Math.random() < 0.55) return aiOpenThree;
    if (humanOpenThree) return humanOpenThree;

    let bestScore = -Infinity;
    let bestMoves = [];

    for (const move of moves) {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluateBoard(WHITE) + evaluatePoint(move.x, move.y, WHITE) * 2.2;
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluateBoard(BLACK) + evaluatePoint(move.x, move.y, BLACK) * 2.0;
      board[move.y][move.x] = EMPTY;

      const centerBonus = getCenterBonus(move.x, move.y) * 1.2;
      const score = aiScore * 1.32 + humanScore * 1.18 + centerBonus;

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [move];
      } else if (Math.abs(score - bestScore) < 0.00001) {
        bestMoves.push(move);
      }
    }

    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  function getBestByScore(moves, randomness) {
    let scored = moves.map(move => {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluatePoint(move.x, move.y, WHITE);
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluatePoint(move.x, move.y, BLACK);
      board[move.y][move.x] = EMPTY;

      const centerBonus = getCenterBonus(move.x, move.y);

      return {
        move,
        score: aiScore * 1.08 + humanScore * 1.0 + centerBonus + Math.random() * 40 * randomness
      };
    });

    scored.sort((a, b) => b.score - a.score);

    const topN = difficulty === "easy" ? 4 : 2;
    const top = scored.slice(0, Math.min(topN, scored.length));

    return top[Math.floor(Math.random() * top.length)].move;
  }

  function findWinningMove(player) {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === EMPTY) {
          board[y][x] = player;
          const win = checkWin(x, y, player);
          board[y][x] = EMPTY;
          if (win) return { x, y };
        }
      }
    }

    return null;
  }

  function findStrongThreat(player, targetCount, targetOpenEnds) {
    const moves = getCandidateMoves();

    for (const move of moves) {
      board[move.y][move.x] = player;
      const dirs = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
      ];

      for (const [dx, dy] of dirs) {
        const info = getLineInfo(move.x, move.y, dx, dy, player);
        if (info.count >= targetCount && info.openEnds >= targetOpenEnds) {
          board[move.y][move.x] = EMPTY;
          return move;
        }
      }

      board[move.y][move.x] = EMPTY;
    }

    return null;
  }

  function getCenterBonus(x, y) {
    const dx = x - 7;
    const dy = y - 7;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return Math.max(0, 28 - dist * 3);
  }

  function evaluateBoard(player) {
    let score = 0;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === player) {
          score += evaluatePoint(x, y, player) * 0.35;
        }
      }
    }

    return score;
  }

  function evaluatePoint(x, y, player) {
    const dirs = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    let total = 0;

    for (const [dx, dy] of dirs) {
      const info = getLineInfo(x, y, dx, dy, player);
      total += patternScore(info.count, info.openEnds);
    }

    return total;
  }

  function getLineInfo(x, y, dx, dy, player) {
    let count = 1;
    let openEnds = 0;

    let nx = x + dx;
    let ny = y + dy;

    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx += dx;
      ny += dy;
    }

    if (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === EMPTY
    ) {
      openEnds++;
    }

    nx = x - dx;
    ny = y - dy;

    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx -= dx;
      ny -= dy;
    }

    if (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === EMPTY
    ) {
      openEnds++;
    }

    return { count, openEnds };
  }

  function patternScore(count, openEnds) {
    if (count >= 5) return 1000000;
    if (count === 4 && openEnds === 2) return 120000;
    if (count === 4 && openEnds === 1) return 18000;
    if (count === 3 && openEnds === 2) return 6500;
    if (count === 3 && openEnds === 1) return 900;
    if (count === 2 && openEnds === 2) return 430;
    if (count === 2 && openEnds === 1) return 90;
    if (count === 1 && openEnds === 2) return 20;
    return 4;
  }

  function startAudio() {
    if (audioStarted) return;

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStarted = true;
      createBackgroundMusic();
    } catch (e) {
      console.log("Audio not supported", e);
    }
  }

  function createBackgroundMusic() {
    if (!audioCtx) return;

    bgGain = audioCtx.createGain();
    bgGain.gain.value = 0.035;
    bgGain.connect(audioCtx.destination);

    const notes = [
      261.63, 329.63, 392.00,
      293.66, 349.23, 440.00
    ];

    notes.forEach((freq, index) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = index % 2 === 0 ? "sine" : "triangle";
      osc.frequency.value = freq / (index < 3 ? 2 : 4);

      gain.gain.value = index < 3 ? 0.12 : 0.06;

      osc.connect(gain);
      gain.connect(bgGain);
      osc.start();

      bgOscillators.push({ osc, gain });
    });

    let step = 0;

    setInterval(() => {
      if (!audioCtx || !bgGain) return;

      const t = audioCtx.currentTime;
      const melody = [
        523.25, 493.88, 440.00, 392.00,
        440.00, 493.88, 587.33, 523.25
      ];

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(melody[step % melody.length], t);

      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.055, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t + 1.7);

      step++;
    }, 1800);
  }

  function playWinSound() {
    if (!audioCtx) return;

    const now = audioCtx.currentTime;

    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.0001, now);
    masterGain.gain.linearRampToValueAtTime(0.085, now + 0.08);
    masterGain.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
    masterGain.connect(audioCtx.destination);

    const notes = [
      { f: 659.25, t: 0.00 },
      { f: 783.99, t: 0.16 },
      { f: 987.77, t: 0.34 },
      { f: 1174.66, t: 0.58 },
      { f: 1567.98, t: 0.92 }
    ];

    notes.forEach((note, i) => {
      const t = now + note.t;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(note.f, t);
      osc.frequency.exponentialRampToValueAtTime(note.f * 1.015, t + 0.42);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(i === 4 ? 0.04 : 0.055, t + 0.035);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.78);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(t);
      osc.stop(t + 0.82);
    });

    const sparkleFreqs = [1318.51, 1760.00, 2093.00, 2637.02];

    sparkleFreqs.forEach((freq, i) => {
      const t = now + 0.18 + i * 0.18;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, t);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.02, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(t);
      osc.stop(t + 0.55);
    });
  }

  function launchMagicFireworks() {
    const bursts = [
      { x: 0.28, y: 0.30 },
      { x: 0.72, y: 0.32 },
      { x: 0.50, y: 0.22 },
      { x: 0.38, y: 0.64 },
      { x: 0.64, y: 0.62 }
    ];

    bursts.forEach((burst, i) => {
      setTimeout(() => createFireworkBurst(burst.x, burst.y), i * 180);
    });
  }

  function createFireworkBurst(rx, ry) {
    const rect = gameScreen.getBoundingClientRect();
    const cx = rect.width * rx;
    const cy = rect.height * ry;
    const count = 22;

    for (let i = 0; i < count; i++) {
      const spark = document.createElement("div");
      spark.className = "spark";

      const angle = (Math.PI * 2 * i) / count;
      const distance = 58 + Math.random() * 52;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;

      spark.style.left = cx + "px";
      spark.style.top = cy + "px";
      spark.style.setProperty("--dx", dx + "px");
      spark.style.setProperty("--dy", dy + "px");

      if (i % 3 === 0) {
        spark.style.background = "rgba(255, 248, 219, 0.96)";
      } else if (i % 3 === 1) {
        spark.style.background = "rgba(226, 205, 255, 0.96)";
      } else {
        spark.style.background = "rgba(190, 219, 255, 0.96)";
      }

      fireworkLayer.appendChild(spark);
      setTimeout(() => spark.remove(), 950);
    }
  }

  function createDust() {
    const dust = document.createElement("div");
    dust.className = "magic-dust";

    const x = Math.random() * window.innerWidth;
    const y = window.innerHeight * (0.55 + Math.random() * 0.4);

    dust.style.left = x + "px";
    dust.style.top = y + "px";
    dust.style.opacity = Math.random() * 0.8 + 0.2;

    document.getElementById("app").appendChild(dust);

    setTimeout(() => dust.remove(), 3600);
  }

  setInterval(createDust, 380);

  updateModeButtons();
  resizeCanvas();
})();
</script>
