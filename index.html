<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>星霧五子棋</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    overflow: hidden;
    font-family:
      "Noto Serif TC",
      "PingFang TC",
      "Microsoft JhengHei",
      serif;
    color: #f6f1df;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.28), transparent 18%),
      radial-gradient(circle at 80% 20%, rgba(190,220,255,0.20), transparent 22%),
      linear-gradient(160deg, #4d5d63 0%, #74806e 38%, #c8b98f 100%);
  }

  #app {
    width: 100vw;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  .background {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(60,74,82,0.2), rgba(32,38,40,0.55)),
      url("data:image/svg+xml,%3Csvg width='1200' height='900' viewBox='0 0 1200 900' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop stop-color='%23d6e6e1' offset='0'/%3E%3Cstop stop-color='%238da094' offset='0.45'/%3E%3Cstop stop-color='%2346504d' offset='1'/%3E%3C/linearGradient%3E%3Cfilter id='blur'%3E%3CfeGaussianBlur stdDeviation='1.8'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='1200' height='900' fill='url(%23g)'/%3E%3Cpath d='M0 570 C180 480 280 530 420 440 C600 320 760 430 900 330 C1050 220 1140 300 1200 250 L1200 900 L0 900 Z' fill='%23586956' opacity='0.75'/%3E%3Cpath d='M0 680 C170 560 310 650 460 540 C650 400 760 560 930 430 C1060 330 1130 390 1200 350 L1200 900 L0 900 Z' fill='%233f4d48' opacity='0.85'/%3E%3Cpath d='M0 760 C220 650 360 760 520 640 C710 500 850 670 1010 520 C1120 420 1170 470 1200 440 L1200 900 L0 900 Z' fill='%232f3837' opacity='0.85'/%3E%3Ccircle cx='210' cy='140' r='4' fill='%23fff7d1' opacity='0.8'/%3E%3Ccircle cx='950' cy='110' r='3' fill='%23fff7d1' opacity='0.75'/%3E%3Ccircle cx='720' cy='190' r='2.5' fill='%23fff7d1' opacity='0.7'/%3E%3Ccircle cx='540' cy='100' r='2' fill='%23fff7d1' opacity='0.7'/%3E%3Cpath d='M160 650 C150 530 170 430 210 350 C248 445 260 540 250 670' fill='%232c3936' opacity='0.58' filter='url(%23blur)'/%3E%3Cpath d='M1040 680 C1010 520 1040 390 1100 300 C1150 420 1160 560 1130 700' fill='%232c3936' opacity='0.48' filter='url(%23blur)'/%3E%3C/svg%3E");
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .mist {
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,0.18), transparent 26%),
      radial-gradient(circle at 70% 30%, rgba(255,255,255,0.12), transparent 28%),
      radial-gradient(circle at 50% 80%, rgba(255,255,255,0.10), transparent 35%);
    animation: drift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes drift {
    from { transform: translateX(-2%) translateY(1%); }
    to { transform: translateX(2%) translateY(-1%); }
  }

  .screen {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: none;
  }

  .screen.active {
    display: flex;
  }

  #menuScreen {
    align-items: center;
    justify-content: center;
    padding: 22px;
  }

  .menu-card {
    width: min(520px, 94vw);
    padding: 28px 24px;
    border: 1px solid rgba(255, 245, 210, 0.45);
    border-radius: 28px;
    background:
      linear-gradient(180deg, rgba(41, 54, 55, 0.78), rgba(25, 32, 33, 0.82));
    box-shadow:
      0 22px 60px rgba(0, 0, 0, 0.36),
      inset 0 0 45px rgba(255, 244, 200, 0.08);
    backdrop-filter: blur(12px);
    text-align: center;
  }

  .title {
    margin: 0;
    font-size: clamp(34px, 8vw, 58px);
    letter-spacing: 0.12em;
    font-weight: 700;
    color: #fff3bf;
    text-shadow:
      0 0 14px rgba(255, 229, 147, 0.65),
      0 4px 10px rgba(0,0,0,0.5);
  }

  .subtitle {
    margin: 10px 0 24px;
    color: #e9e2c6;
    line-height: 1.7;
    font-size: 15px;
  }

  .section-title {
    margin: 18px 0 9px;
    color: #fff0bd;
    font-size: 15px;
    letter-spacing: 0.12em;
  }

  .choice-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .choice-btn,
  .main-btn,
  .small-btn {
    border: 1px solid rgba(255, 238, 188, 0.45);
    color: #f9efcf;
    background:
      linear-gradient(180deg, rgba(120, 132, 107, 0.55), rgba(60, 73, 66, 0.65));
    border-radius: 999px;
    padding: 11px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .choice-btn:hover,
  .main-btn:hover,
  .small-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 26px rgba(0,0,0,0.28);
  }

  .choice-btn.selected {
    background:
      linear-gradient(180deg, rgba(255, 224, 140, 0.8), rgba(157, 128, 65, 0.78));
    color: #24302d;
    border-color: rgba(255,255,255,0.72);
  }

  .main-btn {
    width: min(320px, 80vw);
    margin-top: 24px;
    padding: 14px 20px;
    font-size: 18px;
    background:
      linear-gradient(180deg, #ffe6a1, #b88c45);
    color: #263331;
    border-color: rgba(255,255,255,0.8);
  }

  .hint {
    margin-top: 18px;
    font-size: 13px;
    color: rgba(242, 236, 210, 0.82);
    line-height: 1.6;
  }

  #gameScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
  }

  .topbar {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 10px);
    left: 10px;
    right: 10px;
    min-height: 58px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    z-index: 4;
  }

  .status-panel {
    min-width: 0;
    padding: 9px 12px;
    border-radius: 18px;
    background: rgba(28, 38, 38, 0.66);
    border: 1px solid rgba(255, 244, 200, 0.34);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 10px 26px rgba(0,0,0,0.2);
  }

  #statusText {
    font-size: clamp(14px, 3.6vw, 18px);
    color: #fff1c1;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #modeText {
    margin-top: 4px;
    font-size: 12px;
    color: rgba(241,235,213,0.78);
  }

  .small-btn {
    padding: 9px 13px;
    font-size: 13px;
    background: rgba(40, 52, 52, 0.72);
    backdrop-filter: blur(8px);
  }

  .board-wrap {
    position: relative;
    width: min(92vw, 82dvh, 720px);
    height: min(92vw, 82dvh, 720px);
    margin-top: 58px;
    border-radius: 24px;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.25), transparent 20%),
      linear-gradient(135deg, rgba(224, 190, 121, 0.96), rgba(130, 99, 58, 0.96));
    border: 2px solid rgba(255, 237, 180, 0.65);
    box-shadow:
      0 28px 70px rgba(0,0,0,0.42),
      inset 0 0 35px rgba(255,255,255,0.18),
      inset 0 0 85px rgba(76,44,20,0.36);
    overflow: hidden;
  }

  .board-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.08), transparent 24%, rgba(67,43,22,0.08) 50%, transparent 76%, rgba(255,255,255,0.06)),
      repeating-linear-gradient(90deg, rgba(94,64,31,0.05) 0 5px, transparent 5px 15px);
    pointer-events: none;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .spell-ring {
    position: absolute;
    width: 120px;
    height: 120px;
    pointer-events: none;
    border-radius: 50%;
    border: 1px solid rgba(255, 243, 177, 0.85);
    box-shadow:
      0 0 18px rgba(255, 239, 166, 0.8),
      inset 0 0 20px rgba(255,255,255,0.28);
    transform: translate(-50%, -50%) scale(0.2);
    opacity: 0;
    z-index: 5;
  }

  .spell-ring.show {
    animation: ring 0.45s ease-out forwards;
  }

  @keyframes ring {
    0% {
      opacity: 0.95;
      transform: translate(-50%, -50%) scale(0.15) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.15) rotate(35deg);
    }
  }

  .result-modal {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(11, 18, 18, 0.42);
    backdrop-filter: blur(5px);
    padding: 22px;
  }

  .result-modal.active {
    display: flex;
  }

  .result-card {
    width: min(420px, 92vw);
    padding: 26px 20px;
    border-radius: 26px;
    background:
      linear-gradient(180deg, rgba(49, 63, 60, 0.94), rgba(24, 32, 31, 0.96));
    border: 1px solid rgba(255, 239, 178, 0.6);
    text-align: center;
    box-shadow: 0 24px 70px rgba(0,0,0,0.45);
  }

  #resultTitle {
    margin: 0 0 12px;
    color: #ffefad;
    font-size: 30px;
    text-shadow: 0 0 16px rgba(255,229,150,0.45);
  }

  #resultDesc {
    color: #eee5c8;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .bottom-note {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    left: 12px;
    right: 12px;
    text-align: center;
    color: rgba(255,245,215,0.72);
    font-size: 12px;
    z-index: 4;
    pointer-events: none;
  }

  .magic-dust {
    position: absolute;
    width: 5px;
    height: 5px;
    background: rgba(255, 239, 170, 0.85);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255, 239, 170, 0.9);
    animation: floatUp 3.5s linear forwards;
    z-index: 3;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translateY(-90px) scale(1.15); opacity: 0; }
  }

  @media (max-width: 720px) {
    #gameScreen {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }

    .topbar {
      top: calc(env(safe-area-inset-top) + 6px);
      left: 6px;
      right: 6px;
      grid-template-columns: 64px 1fr 64px;
    }

    .small-btn {
      padding: 8px 8px;
      font-size: 12px;
    }

    .board-wrap {
      width: min(100vw, calc(100dvh - 120px));
      height: min(100vw, calc(100dvh - 120px));
      border-radius: 18px;
      margin-top: 52px;
    }

    .menu-card {
      padding: 24px 18px;
    }

    .choice-btn {
      min-width: 100px;
    }

    .bottom-note {
      display: none;
    }
  }

  @media (orientation: landscape) and (max-height: 520px) {
    .topbar {
      grid-template-columns: 76px 1fr 76px;
      min-height: 46px;
    }

    .status-panel {
      padding: 6px 10px;
    }

    #modeText {
      display: none;
    }

    .board-wrap {
      margin-top: 46px;
      width: min(82vh, 72vw);
      height: min(82vh, 72vw);
    }
  }
</style>
</head>

<body>
<div id="app">
  <div class="background"></div>
  <div class="mist"></div>

  <section id="menuScreen" class="screen active">
    <div class="menu-card">
      <h1 class="title">星霧五子棋</h1>
      <p class="subtitle">
        在靜謐森林與古老魔法的棋盤上，<br>
        用黑白星石展開一場溫柔卻深邃的對局。
      </p>

      <div class="section-title">選擇模式</div>
      <div class="choice-row">
        <button class="choice-btn selected" data-mode="ai">和電腦對戰</button>
        <button class="choice-btn" data-mode="pvp">兩人對戰</button>
      </div>

      <div class="section-title">電腦難度</div>
      <div class="choice-row">
        <button class="choice-btn" data-difficulty="easy">簡單</button>
        <button class="choice-btn selected" data-difficulty="normal">普通</button>
        <button class="choice-btn" data-difficulty="hard">困難</button>
      </div>

      <button id="startBtn" class="main-btn">開始遊戲</button>

      <div class="hint">
        手機：直接點棋盤落子。<br>
        電腦：滑鼠點擊落子。<br>
        黑棋先手，先連成五子者獲勝。
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="topbar">
      <button id="backBtn" class="small-btn">選單</button>
      <div class="status-panel">
        <div id="statusText">黑棋回合</div>
        <div id="modeText">和電腦對戰｜普通</div>
      </div>
      <button id="restartBtn" class="small-btn">重開</button>
    </div>

    <div id="boardWrap" class="board-wrap">
      <canvas id="boardCanvas"></canvas>
      <div id="spellRing" class="spell-ring"></div>
    </div>

    <div class="bottom-note">
      背景樂與音效會在第一次點擊後啟動。若手機靜音，請關閉靜音模式。
    </div>

    <div id="resultModal" class="result-modal">
      <div class="result-card">
        <h2 id="resultTitle">黑棋勝利</h2>
        <div id="resultDesc">星光在棋盤上匯聚，旅程暫時告一段落。</div>
        <button id="againBtn" class="main-btn">再來一局</button>
        <button id="menuBtn" class="small-btn" style="margin-top:12px;">回到選單</button>
      </div>
    </div>
  </section>
</div>

<script>
(() => {
  const SIZE = 15;
  const EMPTY = 0;
  const BLACK = 1;
  const WHITE = 2;

  const menuScreen = document.getElementById("menuScreen");
  const gameScreen = document.getElementById("gameScreen");
  const boardWrap = document.getElementById("boardWrap");
  const canvas = document.getElementById("boardCanvas");
  const ctx = canvas.getContext("2d");

  const startBtn = document.getElementById("startBtn");
  const backBtn = document.getElementById("backBtn");
  const restartBtn = document.getElementById("restartBtn");
  const againBtn = document.getElementById("againBtn");
  const menuBtn = document.getElementById("menuBtn");

  const statusText = document.getElementById("statusText");
  const modeText = document.getElementById("modeText");
  const resultModal = document.getElementById("resultModal");
  const resultTitle = document.getElementById("resultTitle");
  const resultDesc = document.getElementById("resultDesc");
  const spellRing = document.getElementById("spellRing");

  let board = [];
  let currentPlayer = BLACK;
  let gameOver = false;
  let mode = "ai";
  let difficulty = "normal";
  let cell = 0;
  let margin = 0;
  let lastMove = null;
  let audioStarted = false;
  let bgGain = null;
  let audioCtx = null;
  let bgOscillators = [];

  function initBoard() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
    currentPlayer = BLACK;
    gameOver = false;
    lastMove = null;
    resultModal.classList.remove("active");
    updateStatus();
    resizeCanvas();
  }

  function showScreen(name) {
    menuScreen.classList.remove("active");
    gameScreen.classList.remove("active");

    if (name === "menu") {
      menuScreen.classList.add("active");
    } else {
      gameScreen.classList.add("active");
    }
  }

  document.querySelectorAll("[data-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      mode = btn.dataset.mode;
      document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      updateModeButtons();
    });
  });

  document.querySelectorAll("[data-difficulty]").forEach(btn => {
    btn.addEventListener("click", () => {
      difficulty = btn.dataset.difficulty;
      document.querySelectorAll("[data-difficulty]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    });
  });

  function updateModeButtons() {
    const difficultyButtons = document.querySelectorAll("[data-difficulty]");
    difficultyButtons.forEach(btn => {
      btn.disabled = mode === "pvp";
      btn.style.opacity = mode === "pvp" ? "0.45" : "1";
    });
  }

  startBtn.addEventListener("click", () => {
    startAudio();
    showScreen("game");
    initBoard();
  });

  backBtn.addEventListener("click", () => {
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  restartBtn.addEventListener("click", () => {
    startAudio();
    initBoard();
  });

  againBtn.addEventListener("click", () => {
    startAudio();
    initBoard();
  });

  menuBtn.addEventListener("click", () => {
    resultModal.classList.remove("active");
    showScreen("menu");
  });

  function updateStatus() {
    if (gameOver) return;

    const playerName = currentPlayer === BLACK ? "黑棋" : "白棋";
    if (mode === "ai") {
      if (currentPlayer === BLACK) {
        statusText.textContent = "你的回合｜黑棋";
      } else {
        statusText.textContent = "電腦思考中｜白棋";
      }
      modeText.textContent = `和電腦對戰｜${difficultyName(difficulty)}`;
    } else {
      statusText.textContent = `${playerName}回合`;
      modeText.textContent = "兩人對戰";
    }
  }

  function difficultyName(value) {
    if (value === "easy") return "簡單";
    if (value === "hard") return "困難";
    return "普通";
  }

  function resizeCanvas() {
    const rect = boardWrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    margin = rect.width * 0.065;
    cell = (rect.width - margin * 2) / (SIZE - 1);

    drawBoard();
  }

  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("orientationchange", () => {
    setTimeout(resizeCanvas, 250);
  });

  function drawBoard() {
    const w = boardWrap.getBoundingClientRect().width;
    const h = boardWrap.getBoundingClientRect().height;

    ctx.clearRect(0, 0, w, h);

    drawWoodTexture(w, h);
    drawMagicCorners(w, h);
    drawGrid(w, h);
    drawStarPoints();
    drawPieces();

    if (lastMove) {
      drawLastMove(lastMove.x, lastMove.y);
    }
  }

  function drawWoodTexture(w, h) {
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, "rgba(245, 213, 145, 0.55)");
    grad.addColorStop(0.5, "rgba(171, 124, 66, 0.38)");
    grad.addColorStop(1, "rgba(105, 70, 35, 0.46)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = 0.22;
    for (let i = 0; i < 28; i++) {
      ctx.beginPath();
      const y = (h / 28) * i + Math.sin(i) * 8;
      ctx.moveTo(0, y);
      for (let x = 0; x <= w; x += 40) {
        ctx.lineTo(x, y + Math.sin(x * 0.025 + i) * 8);
      }
      ctx.strokeStyle = i % 2 ? "#6e4725" : "#fff0b8";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawMagicCorners(w, h) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = "rgba(255, 239, 179, 0.7)";
    ctx.lineWidth = 1.2;

    const r = w * 0.09;
    const gap = w * 0.035;

    [[gap, gap], [w - gap, gap], [gap, h - gap], [w - gap, h - gap]].forEach(([x, y], index) => {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
      ctx.stroke();

      for (let a = 0; a < 6; a++) {
        const angle = (Math.PI * 2 / 6) * a + index * 0.2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
        ctx.stroke();
      }
    });

    ctx.restore();
  }

  function drawGrid() {
    ctx.save();
    ctx.strokeStyle = "rgba(56, 40, 26, 0.82)";
    ctx.lineWidth = 1.2;

    for (let i = 0; i < SIZE; i++) {
      const p = margin + i * cell;

      ctx.beginPath();
      ctx.moveTo(margin, p);
      ctx.lineTo(margin + cell * (SIZE - 1), p);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(p, margin);
      ctx.lineTo(p, margin + cell * (SIZE - 1));
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawStarPoints() {
    const points = [
      [3,3], [7,3], [11,3],
      [3,7], [7,7], [11,7],
      [3,11], [7,11], [11,11]
    ];

    ctx.save();
    points.forEach(([x, y]) => {
      const px = margin + x * cell;
      const py = margin + y * cell;
      ctx.beginPath();
      ctx.arc(px, py, Math.max(3, cell * 0.09), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(58, 39, 22, 0.86)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, py, Math.max(8, cell * 0.2), 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255, 239, 179, 0.25)";
      ctx.lineWidth = 1;
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawPieces() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          drawPiece(x, y, board[y][x]);
        }
      }
    }
  }

  function drawPiece(x, y, player) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.38;

    ctx.save();

    ctx.beginPath();
    ctx.arc(px + r * 0.18, py + r * 0.22, r * 1.02, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.23)";
    ctx.fill();

    const grad = ctx.createRadialGradient(
      px - r * 0.35, py - r * 0.35, r * 0.15,
      px, py, r
    );

    if (player === BLACK) {
      grad.addColorStop(0, "#6e6d62");
      grad.addColorStop(0.35, "#272c2b");
      grad.addColorStop(1, "#060807");
    } else {
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#f2ead1");
      grad.addColorStop(1, "#bcae88");
    }

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px - r * 0.28, py - r * 0.28, r * 0.17, 0, Math.PI * 2);
    ctx.fillStyle = player === BLACK
      ? "rgba(255,255,230,0.28)"
      : "rgba(255,255,255,0.75)";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = player === BLACK
      ? "rgba(255,244,190,0.20)"
      : "rgba(82,62,34,0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  function drawLastMove(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    const r = cell * 0.17;

    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255, 232, 132, 0.95)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, r * 0.32, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 232, 132, 0.95)";
    ctx.fill();
    ctx.restore();
  }

  function getBoardPosition(evt) {
    const rect = canvas.getBoundingClientRect();
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;

    const x = Math.round((clientX - rect.left - margin) / cell);
    const y = Math.round((clientY - rect.top - margin) / cell);

    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return null;

    const px = margin + x * cell;
    const py = margin + y * cell;
    const dx = clientX - rect.left - px;
    const dy = clientY - rect.top - py;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > cell * 0.52) return null;

    return { x, y, clientX, clientY };
  }

  canvas.addEventListener("pointerdown", (evt) => {
    evt.preventDefault();
    startAudio();

    if (gameOver) return;
    if (mode === "ai" && currentPlayer === WHITE) return;

    const pos = getBoardPosition(evt);
    if (!pos) return;

    placeMove(pos.x, pos.y, currentPlayer, true);
  });

  function placeMove(x, y, player, fromHuman = false) {
    if (board[y][x] !== EMPTY || gameOver) return false;

    board[y][x] = player;
    lastMove = { x, y };
    playPlaceSound(player);
    showSpellAt(x, y);
    drawBoard();

    if (checkWin(x, y, player)) {
      endGame(player);
      return true;
    }

    if (isBoardFull()) {
      endDraw();
      return true;
    }

    currentPlayer = player === BLACK ? WHITE : BLACK;
    updateStatus();

    if (mode === "ai" && currentPlayer === WHITE && !gameOver) {
      setTimeout(aiTurn, 350);
    }

    return true;
  }

  function showSpellAt(x, y) {
    const px = margin + x * cell;
    const py = margin + y * cell;
    spellRing.style.left = px + "px";
    spellRing.style.top = py + "px";
    spellRing.classList.remove("show");
    void spellRing.offsetWidth;
    spellRing.classList.add("show");
  }

  function checkWin(x, y, player) {
    const dirs = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    for (const [dx, dy] of dirs) {
      let count = 1;
      count += countDirection(x, y, dx, dy, player);
      count += countDirection(x, y, -dx, -dy, player);
      if (count >= 5) return true;
    }

    return false;
  }

  function countDirection(x, y, dx, dy, player) {
    let count = 0;
    let nx = x + dx;
    let ny = y + dy;

    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx += dx;
      ny += dy;
    }

    return count;
  }

  function isBoardFull() {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === EMPTY) return false;
      }
    }
    return true;
  }

  function endGame(player) {
    gameOver = true;
    playWinSound();

    const winner = player === BLACK ? "黑棋" : "白棋";
    if (mode === "ai") {
      if (player === BLACK) {
        resultTitle.textContent = "你贏了！";
        resultDesc.textContent = "星石連成了魔法之路，你在靜謐的旅途中勝出了。";
      } else {
        resultTitle.textContent = "電腦勝利";
        resultDesc.textContent = "白色星石悄悄連成一線，森林裡響起了溫柔的鐘聲。";
      }
    } else {
      resultTitle.textContent = `${winner}勝利`;
      resultDesc.textContent = "五枚星石連成一線，這場旅人的對局分出了勝負。";
    }

    statusText.textContent = `${winner}勝利`;
    setTimeout(() => {
      resultModal.classList.add("active");
    }, 450);
  }

  function endDraw() {
    gameOver = true;
    resultTitle.textContent = "平手";
    resultDesc.textContent = "棋盤被星石填滿，這是一場安靜而漂亮的旅程。";
    statusText.textContent = "平手";
    setTimeout(() => {
      resultModal.classList.add("active");
    }, 450);
  }

  function aiTurn() {
    if (gameOver) return;

    const move = getAIMove();
    if (move) {
      placeMove(move.x, move.y, WHITE, false);
    }
  }

  function getAIMove() {
    const moves = getCandidateMoves();

    if (moves.length === 0) {
      return { x: 7, y: 7 };
    }

    if (difficulty === "easy") {
      return getEasyMove(moves);
    }

    if (difficulty === "normal") {
      return getNormalMove(moves);
    }

    return getHardMove(moves);
  }

  function getCandidateMoves() {
    const candidates = [];
    const seen = new Set();

    let hasStone = false;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] !== EMPTY) {
          hasStone = true;

          for (let dy = -2; dy <= 2; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
              const nx = x + dx;
              const ny = y + dy;
              if (
                nx >= 0 && nx < SIZE &&
                ny >= 0 && ny < SIZE &&
                board[ny][nx] === EMPTY
              ) {
                const key = nx + "," + ny;
                if (!seen.has(key)) {
                  seen.add(key);
                  candidates.push({ x: nx, y: ny });
                }
              }
            }
          }
        }
      }
    }

    if (!hasStone) return [{ x: 7, y: 7 }];

    return candidates;
  }

  function getEasyMove(moves) {
    if (Math.random() < 0.25) {
      return moves[Math.floor(Math.random() * moves.length)];
    }

    return getBestByScore(moves, 0.75);
  }

  function getNormalMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    return getBestByScore(moves, 1.0);
  }

  function getHardMove(moves) {
    const immediate = findWinningMove(WHITE);
    if (immediate) return immediate;

    const block = findWinningMove(BLACK);
    if (block) return block;

    let bestScore = -Infinity;
    let bestMoves = [];

    for (const move of moves) {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluateBoard(WHITE);
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluateBoard(BLACK);
      board[move.y][move.x] = EMPTY;

      const centerBonus = getCenterBonus(move.x, move.y);
      const score = aiScore * 1.18 + humanScore * 1.04 + centerBonus;

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [move];
      } else if (score === bestScore) {
        bestMoves.push(move);
      }
    }

    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  function getBestByScore(moves, randomness) {
    let scored = moves.map(move => {
      board[move.y][move.x] = WHITE;
      const aiScore = evaluatePoint(move.x, move.y, WHITE);
      board[move.y][move.x] = EMPTY;

      board[move.y][move.x] = BLACK;
      const humanScore = evaluatePoint(move.x, move.y, BLACK);
      board[move.y][move.x] = EMPTY;

      const centerBonus = getCenterBonus(move.x, move.y);
      return {
        move,
        score: aiScore * 1.08 + humanScore * 1.0 + centerBonus + Math.random() * 40 * randomness
      };
    });

    scored.sort((a, b) => b.score - a.score);

    const topN = difficulty === "easy" ? 4 : 2;
    const top = scored.slice(0, Math.min(topN, scored.length));
    return top[Math.floor(Math.random() * top.length)].move;
  }

  function findWinningMove(player) {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === EMPTY) {
          board[y][x] = player;
          const win = checkWin(x, y, player);
          board[y][x] = EMPTY;
          if (win) return { x, y };
        }
      }
    }
    return null;
  }

  function getCenterBonus(x, y) {
    const dx = x - 7;
    const dy = y - 7;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return Math.max(0, 28 - dist * 3);
  }

  function evaluateBoard(player) {
    let score = 0;

    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x] === player) {
          score += evaluatePoint(x, y, player) * 0.35;
        }
      }
    }

    return score;
  }

  function evaluatePoint(x, y, player) {
    const dirs = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    let total = 0;

    for (const [dx, dy] of dirs) {
      const info = getLineInfo(x, y, dx, dy, player);
      total += patternScore(info.count, info.openEnds);
    }

    return total;
  }

  function getLineInfo(x, y, dx, dy, player) {
    let count = 1;
    let openEnds = 0;

    let nx = x + dx;
    let ny = y + dy;
    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx += dx;
      ny += dy;
    }
    if (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === EMPTY
    ) {
      openEnds++;
    }

    nx = x - dx;
    ny = y - dy;
    while (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === player
    ) {
      count++;
      nx -= dx;
      ny -= dy;
    }
    if (
      nx >= 0 && nx < SIZE &&
      ny >= 0 && ny < SIZE &&
      board[ny][nx] === EMPTY
    ) {
      openEnds++;
    }

    return { count, openEnds };
  }

  function patternScore(count, openEnds) {
    if (count >= 5) return 1000000;
    if (count === 4 && openEnds === 2) return 120000;
    if (count === 4 && openEnds === 1) return 18000;
    if (count === 3 && openEnds === 2) return 6500;
    if (count === 3 && openEnds === 1) return 900;
    if (count === 2 && openEnds === 2) return 430;
    if (count === 2 && openEnds === 1) return 90;
    if (count === 1 && openEnds === 2) return 20;
    return 4;
  }

  function startAudio() {
    if (audioStarted) return;

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStarted = true;
      createBackgroundMusic();
    } catch (e) {
      console.log("Audio not supported", e);
    }
  }

  function createBackgroundMusic() {
    if (!audioCtx) return;

    bgGain = audioCtx.createGain();
    bgGain.gain.value = 0.035;
    bgGain.connect(audioCtx.destination);

    const notes = [
      261.63, 329.63, 392.00,
      293.66, 349.23, 440.00
    ];

    notes.forEach((freq, index) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = index % 2 === 0 ? "sine" : "triangle";
      osc.frequency.value = freq / (index < 3 ? 2 : 4);

      gain.gain.value = index < 3 ? 0.12 : 0.06;

      osc.connect(gain);
      gain.connect(bgGain);
      osc.start();

      bgOscillators.push({ osc, gain });
    });

    let step = 0;
    setInterval(() => {
      if (!audioCtx || !bgGain) return;

      const t = audioCtx.currentTime;
      const melody = [
        523.25, 493.88, 440.00, 392.00,
        440.00, 493.88, 587.33, 523.25
      ];

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(melody[step % melody.length], t);

      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.055, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 1.7);

      step++;
    }, 1800);
  }

  function playPlaceSound(player) {
    if (!audioCtx) return;

    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(player === BLACK ? 520 : 720, t);
    osc.frequency.exponentialRampToValueAtTime(player === BLACK ? 260 : 360, t + 0.18);

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.16, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.23);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(t);
    osc.stop(t + 0.25);
  }

  function playWinSound() {
    if (!audioCtx) return;

    const notes = [523.25, 659.25, 783.99, 1046.5];

    notes.forEach((freq, i) => {
      const t = audioCtx.currentTime + i * 0.12;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, t);

      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t + 0.6);
    });
  }

  function createDust() {
    const dust = document.createElement("div");
    dust.className = "magic-dust";

    const x = Math.random() * window.innerWidth;
    const y = window.innerHeight * (0.55 + Math.random() * 0.4);

    dust.style.left = x + "px";
    dust.style.top = y + "px";
    dust.style.opacity = Math.random() * 0.8 + 0.2;

    document.getElementById("app").appendChild(dust);

    setTimeout(() => dust.remove(), 3600);
  }

  setInterval(createDust, 380);

  updateModeButtons();
  resizeCanvas();
})();
</script>
