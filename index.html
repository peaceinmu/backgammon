<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>慢慢五子棋</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;height:100%}
body{
  overflow:hidden;
  font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif;
  color:#f6f1ff;
  background:
    radial-gradient(circle at 18% 12%,rgba(255,255,255,.32),transparent 18%),
    radial-gradient(circle at 82% 18%,rgba(190,220,255,.30),transparent 23%),
    radial-gradient(circle at 50% 72%,rgba(202,180,255,.22),transparent 35%),
    linear-gradient(160deg,#466fc0 0%,#5d72d4 34%,#7c67c4 64%,#b99be5 100%);
}
#app{width:100vw;height:100dvh;position:relative;overflow:hidden}
.background{
  position:absolute;inset:0;z-index:0;
  background:
    linear-gradient(to bottom,rgba(74,105,184,.18),rgba(31,35,82,.62)),
    url("data:image/svg+xml,%3Csvg width='1200' height='900' viewBox='0 0 1200 900' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop stop-color='%23e8f2ff' offset='0'/%3E%3Cstop stop-color='%238da8e8' offset='0.42'/%3E%3Cstop stop-color='%235b5ebf' offset='0.68'/%3E%3Cstop stop-color='%23333282' offset='1'/%3E%3C/linearGradient%3E%3Cfilter id='blur'%3E%3CfeGaussianBlur stdDeviation='1.8'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='1200' height='900' fill='url(%23g)'/%3E%3Cpath d='M0 570 C180 480 280 530 420 440 C600 320 760 430 900 330 C1050 220 1140 300 1200 250 L1200 900 L0 900 Z' fill='%236f86d8' opacity='0.66'/%3E%3Cpath d='M0 680 C170 560 310 650 460 540 C650 400 760 560 930 430 C1060 330 1130 390 1200 350 L1200 900 L0 900 Z' fill='%235c66c0' opacity='0.78'/%3E%3Cpath d='M0 760 C220 650 360 760 520 640 C710 500 850 670 1010 520 C1120 420 1170 470 1200 440 L1200 900 L0 900 Z' fill='%232d317e' opacity='0.88'/%3E%3Ccircle cx='210' cy='140' r='4' fill='%23fff8d6' opacity='0.85'/%3E%3Ccircle cx='950' cy='110' r='3' fill='%23fff8d6' opacity='0.75'/%3E%3Ccircle cx='720' cy='190' r='2.5' fill='%23fff8d6' opacity='0.72'/%3E%3Ccircle cx='540' cy='100' r='2' fill='%23fff8d6' opacity='0.75'/%3E%3Ccircle cx='340' cy='210' r='2.5' fill='%23e8e4ff' opacity='0.72'/%3E%3Ccircle cx='1080' cy='200' r='2.5' fill='%23dceeff' opacity='0.75'/%3E%3Cpath d='M160 650 C150 530 170 430 210 350 C248 445 260 540 250 670' fill='%232d2f75' opacity='0.52' filter='url(%23blur)'/%3E%3Cpath d='M1040 680 C1010 520 1040 390 1100 300 C1150 420 1160 560 1130 700' fill='%232d2f75' opacity='0.45' filter='url(%23blur)'/%3E%3C/svg%3E");
  background-size:cover;background-position:center;
}
.mist{
  position:absolute;inset:-10%;z-index:1;pointer-events:none;
  background:
    radial-gradient(circle at 15% 25%,rgba(255,255,255,.20),transparent 26%),
    radial-gradient(circle at 70% 30%,rgba(210,230,255,.23),transparent 28%),
    radial-gradient(circle at 50% 80%,rgba(209,190,255,.17),transparent 35%);
  animation:drift 18s ease-in-out infinite alternate;
}
@keyframes drift{from{transform:translateX(-2%) translateY(1%)}to{transform:translateX(2%) translateY(-1%)}}
.screen{position:absolute;inset:0;z-index:2;display:none}
.screen.active{display:flex}
#menuScreen{align-items:center;justify-content:center;padding:22px}
.menu-scene{position:absolute;inset:0;z-index:0;pointer-events:none}
.moon{
  position:absolute;top:4.5vh;right:8vw;
  width:clamp(48px,10vw,86px);height:clamp(48px,10vw,86px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fffaf0 0%,#f6e7ff 44%,#d8c2ff 72%,rgba(216,194,255,.7) 100%);
  box-shadow:0 0 20px rgba(255,243,255,.95),0 0 42px rgba(205,225,255,.82),0 0 72px rgba(164,189,255,.56);
}
.moon:after{
  content:"";position:absolute;width:78%;height:78%;border-radius:50%;right:-15%;top:6%;
  background:rgba(82,92,176,.56);filter:blur(1px)
}
.star{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#fff8db;
  box-shadow:0 0 8px rgba(255,248,219,1),0 0 18px rgba(205,228,255,.9);
  animation:twinkle 2.8s ease-in-out infinite alternate;
}
.star:before,.star:after{
  content:"";position:absolute;left:50%;top:50%;background:rgba(255,248,219,.9);
  transform:translate(-50%,-50%);border-radius:999px
}
.star:before{width:18px;height:1px}.star:after{width:1px;height:18px}
.s1{top:15vh;left:16vw}.s2{top:19vh;left:76vw;transform:scale(.72);animation-delay:.6s}
.s3{top:34vh;left:11vw;transform:scale(.58);animation-delay:1.2s}
.s4{top:12vh;left:47vw;transform:scale(.82);animation-delay:1.7s}
.s5{top:42vh;left:82vw;transform:scale(.55);animation-delay:.9s}
@keyframes twinkle{from{opacity:.45;filter:blur(.2px)}to{opacity:1;filter:blur(0)}}
.menu-mountains{
  position:absolute;left:0;right:0;bottom:0;height:36vh;opacity:.95;
  background:url("data:image/svg+xml,%3Csvg width='1200' height='340' viewBox='0 0 1200 340' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 250 L120 150 L220 225 L350 95 L500 230 L640 125 L790 235 L935 80 L1080 225 L1200 130 L1200 340 L0 340 Z' fill='%232c3d8f' opacity='0.72'/%3E%3Cpath d='M0 285 L150 195 L280 260 L415 150 L570 275 L710 178 L850 268 L1010 145 L1200 260 L1200 340 L0 340 Z' fill='%233f51ad' opacity='0.58'/%3E%3Cpath d='M0 315 C160 265 260 310 420 255 C590 198 740 290 910 230 C1040 185 1140 230 1200 205 L1200 340 L0 340 Z' fill='%231f2b6d' opacity='0.78'/%3E%3C/svg%3E");
  background-size:cover;background-position:bottom center;
}
.menu-card{
  position:relative;z-index:2;width:min(480px,94vw);padding:26px 22px;
  border:none;border-radius:30px;
  background:linear-gradient(180deg,rgba(80,88,178,.68),rgba(43,45,112,.82));
  box-shadow:0 22px 60px rgba(0,0,0,.32),inset 0 0 45px rgba(225,235,255,.13);
  backdrop-filter:blur(13px);text-align:center;
}
.title{
  margin:0;font-size:clamp(34px,8vw,56px);letter-spacing:.12em;font-weight:700;color:#f2f8ff;
  text-shadow:0 0 14px rgba(198,224,255,.95),0 4px 10px rgba(0,0,0,.45)
}
.subtitle{margin:12px 0 20px;color:#edf4ff;line-height:1.7;font-size:15px}
.section-title{margin:16px 0 9px;color:#f0f6ff;font-size:15px;letter-spacing:.12em}
.choice-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.difficulty-grid{display:grid;grid-template-columns:repeat(2,minmax(96px,136px));gap:10px;justify-content:center}
.choice-btn,.main-btn,.small-btn{
  position:relative;border:none;outline:none;overflow:hidden;color:#f8fbff;
  background:
    radial-gradient(circle at 28% 18%,rgba(255,255,255,.78),rgba(255,255,255,.22) 20%,rgba(255,255,255,.06) 38%,transparent 56%),
    linear-gradient(180deg,rgba(146,178,255,.78),rgba(109,99,211,.82) 55%,rgba(84,76,176,.88));
  border-radius:999px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,.18),inset 0 2px 7px rgba(255,255,255,.40),inset 0 -8px 14px rgba(62,60,159,.28);
  transition:transform .15s,box-shadow .15s
}
.choice-btn:before,.main-btn:before,.small-btn:before{
  content:"";position:absolute;left:13%;top:9%;width:68%;height:42%;border-radius:999px;
  background:linear-gradient(180deg,rgba(255,255,255,.48),rgba(255,255,255,.14),rgba(255,255,255,0));
  opacity:.74;
  filter:blur(7px);
  pointer-events:none
}
.choice-btn:hover,.main-btn:hover,.small-btn:hover{
  transform:translateY(-1px) scale(1.015);
  box-shadow:0 14px 28px rgba(0,0,0,.22),inset 0 2px 8px rgba(255,255,255,.48),inset 0 -8px 14px rgba(62,60,159,.25)
}
.choice-btn.selected{
  background:
    radial-gradient(circle at 28% 18%,rgba(255,255,255,.88),rgba(255,255,255,.24) 24%,rgba(255,255,255,.08) 42%,transparent 58%),
    linear-gradient(180deg,rgba(235,247,255,.98),rgba(177,210,255,.92) 45%,rgba(180,149,235,.95));
  color:#30407a
}
.main-btn{
  width:min(300px,80vw);margin-top:24px;padding:14px 20px;font-size:18px;
  background:
    radial-gradient(circle at 28% 18%,rgba(255,255,255,.88),rgba(255,255,255,.23) 24%,rgba(255,255,255,.07) 43%,transparent 60%),
    linear-gradient(180deg,#e9f6ff,#afcfff 46%,#a98be4);
  color:#30407a
}
.hint{margin-top:16px;font-size:13px;color:rgba(238,246,255,.82);line-height:1.6}
#gameScreen{flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom)}
.game-glyph{
  position:absolute;left:50%;transform:translateX(-50%);width:min(520px,88vw);height:82px;z-index:3;pointer-events:none;opacity:.36;
  background:url("data:image/svg+xml,%3Csvg width='700' height='110' viewBox='0 0 700 110' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23eef7ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M60 55 C120 18 180 18 240 55 C300 92 400 92 460 55 C520 18 580 18 640 55' opacity='.8'/%3E%3Ccircle cx='350' cy='55' r='28'/%3E%3Ccircle cx='350' cy='55' r='12'/%3E%3Cpath d='M350 18 L350 92 M313 55 L387 55'/%3E%3Cpath d='M130 55 C145 35 165 35 180 55 C165 75 145 75 130 55 Z'/%3E%3Cpath d='M520 55 C535 35 555 35 570 55 C555 75 535 75 520 55 Z'/%3E%3Cpath d='M75 38 L92 55 L75 72 M625 38 L608 55 L625 72'/%3E%3C/g%3E%3C/svg%3E");
  background-size:contain;background-repeat:no-repeat;background-position:center;filter:drop-shadow(0 0 9px rgba(200,225,255,.65))
}
.game-glyph.top{top:calc(env(safe-area-inset-top) + 56px)}
.game-glyph.bottom{bottom:calc(env(safe-area-inset-bottom) + 12px);transform:translateX(-50%) rotate(180deg)}
.topbar{
  position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;min-height:58px;
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:start;z-index:4
}
.status-panel{
  min-width:0;padding:9px 12px;border-radius:18px;
  background:radial-gradient(circle at 30% 15%,rgba(255,255,255,.35),transparent 34%),rgba(52,63,148,.68);
  border:none;backdrop-filter:blur(10px);text-align:center;box-shadow:0 10px 26px rgba(0,0,0,.18)
}
#statusText{font-size:clamp(14px,3.6vw,18px);color:#f4f9ff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#modeText{margin-top:4px;font-size:12px;color:rgba(240,247,255,.84)}
.small-btn{padding:9px 13px;font-size:13px;background:radial-gradient(circle at 28% 18%,rgba(255,255,255,.68),rgba(255,255,255,.15) 22%,transparent 46%),linear-gradient(180deg,rgba(119,156,238,.78),rgba(79,79,190,.78));backdrop-filter:blur(8px)}
.right-controls{
  display:flex;
  flex-direction:column;
  gap:7px;
  align-items:stretch;
}
.icon-btn{
  width:100%;
  height:38px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.icon-btn svg{
  display:block;
  width:24px;
  height:24px;
}
.board-wrap{
  position:relative;width:min(92vw,82dvh,720px);height:min(92vw,82dvh,720px);margin-top:58px;border-radius:24px;
  background:radial-gradient(circle at 20% 15%,rgba(255,255,255,.30),transparent 20%),
             linear-gradient(135deg,rgba(205,224,255,.95),rgba(171,180,255,.92) 44%,rgba(122,116,215,.96));
  border:2px solid rgba(225,239,255,.45);
  box-shadow:0 28px 70px rgba(0,0,0,.42),inset 0 0 35px rgba(255,255,255,.24),inset 0 0 85px rgba(58,70,155,.34);
  overflow:hidden;z-index:4
}
.board-wrap:before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 24%,rgba(59,70,158,.08) 50%,transparent 76%,rgba(255,255,255,.08)),
             repeating-linear-gradient(90deg,rgba(70,90,160,.05) 0 5px,transparent 5px 15px);
  pointer-events:none
}
.board-wrap:after{
  content:"";position:absolute;inset:10px;border-radius:18px;pointer-events:none;opacity:.35;z-index:1;
  background:url("data:image/svg+xml,%3Csvg width='640' height='640' viewBox='0 0 640 640' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23eef7ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M54 92 C92 62 135 64 160 96 C129 93 100 107 78 134' opacity='0.95'/%3E%3Cpath d='M64 132 C106 118 138 130 162 164' opacity='0.75'/%3E%3Cpath d='M586 92 C548 62 505 64 480 96 C511 93 540 107 562 134' opacity='0.95'/%3E%3Cpath d='M576 132 C534 118 502 130 478 164' opacity='0.75'/%3E%3Cpath d='M54 548 C92 578 135 576 160 544 C129 547 100 533 78 506' opacity='0.95'/%3E%3Cpath d='M64 508 C106 522 138 510 162 476' opacity='0.75'/%3E%3Cpath d='M586 548 C548 578 505 576 480 544 C511 547 540 533 562 506' opacity='0.95'/%3E%3Cpath d='M576 508 C534 522 502 510 478 476' opacity='0.75'/%3E%3Ccircle cx='90' cy='90' r='8'/%3E%3Ccircle cx='550' cy='90' r='8'/%3E%3Ccircle cx='90' cy='550' r='8'/%3E%3Ccircle cx='550' cy='550' r='8'/%3E%3Cpath d='M320 42 C334 58 334 74 320 90 C306 74 306 58 320 42 Z' opacity='0.72'/%3E%3Cpath d='M320 598 C334 582 334 566 320 550 C306 566 306 582 320 598 Z' opacity='0.72'/%3E%3Cpath d='M42 320 C58 306 74 306 90 320 C74 334 58 334 42 320 Z' opacity='0.72'/%3E%3Cpath d='M598 320 C582 306 566 306 550 320 C566 334 582 334 598 320 Z' opacity='0.72'/%3E%3C/g%3E%3C/svg%3E");
  background-size:100% 100%;background-repeat:no-repeat
}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:2}
.spell-ring{
  position:absolute;width:120px;height:120px;pointer-events:none;border-radius:50%;border:1px solid rgba(225,240,255,.9);
  box-shadow:0 0 18px rgba(205,228,255,.9),inset 0 0 20px rgba(255,255,255,.30);
  transform:translate(-50%,-50%) scale(.2);opacity:0;z-index:5
}
.spell-ring.show{animation:ring .45s ease-out forwards}
@keyframes ring{0%{opacity:.95;transform:translate(-50%,-50%) scale(.15) rotate(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.15) rotate(35deg)}}
.firework-layer{position:absolute;inset:0;z-index:9;pointer-events:none;overflow:hidden}
.spark{
  position:absolute;width:7px;height:7px;border-radius:50%;background:rgba(255,246,255,.96);
  box-shadow:0 0 8px rgba(255,246,255,.95),0 0 18px rgba(196,224,255,.85);
  transform:translate(-50%,-50%);animation:sparkleFly 1200ms ease-out forwards
}
@keyframes sparkleFly{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.55)}
  65%{opacity:1}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.1)}
}
.result-modal{
  position:absolute;inset:0;z-index:8;display:none;align-items:center;justify-content:center;
  background:rgba(16,20,54,.18);backdrop-filter:blur(2px);padding:22px
}
.result-modal.active{display:flex}
.result-card{
  position:relative;width:min(360px,88vw);padding:28px 20px 24px;border-radius:28px;
  background:radial-gradient(circle at 25% 14%,rgba(255,255,255,.42),transparent 30%),linear-gradient(180deg,rgba(95,118,214,.86),rgba(67,62,160,.92));
  border:none;text-align:center;
  box-shadow:0 0 28px rgba(205,228,255,.46),0 0 60px rgba(184,165,255,.36),0 24px 70px rgba(0,0,0,.34),inset 0 3px 12px rgba(255,255,255,.28);
  overflow:visible
}
.result-card:before{
  content:"";position:absolute;inset:-18px;border-radius:38px;
  background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.72),transparent 8%),
             radial-gradient(circle at 80% 26%,rgba(204,230,255,.72),transparent 9%),
             radial-gradient(circle at 30% 88%,rgba(234,210,255,.72),transparent 8%),
             radial-gradient(circle at 76% 82%,rgba(255,248,216,.66),transparent 7%);
  filter:blur(2px);opacity:.72;animation:resultGlow 1.8s ease-in-out infinite alternate;z-index:-1
}
@keyframes resultGlow{from{opacity:.45;transform:scale(.98)}to{opacity:.88;transform:scale(1.02)}}
#resultTitle{margin:0;color:#f6fbff;font-size:32px;text-shadow:0 0 12px rgba(210,230,255,.95),0 0 22px rgba(229,206,255,.72)}
#resultDesc{display:none}
.bottom-note{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 8px);left:12px;right:12px;text-align:center;color:rgba(238,246,255,.74);font-size:12px;z-index:4;pointer-events:none}
.magic-dust{
  position:absolute;width:5px;height:5px;background:rgba(218,236,255,.88);border-radius:50%;
  box-shadow:0 0 10px rgba(218,236,255,.95);animation:floatUp 3.5s linear forwards;z-index:3;pointer-events:none
}
@keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0}15%{opacity:1}100%{transform:translateY(-90px) scale(1.15);opacity:0}}
@media(max-width:720px){
  #gameScreen{justify-content:center;padding-left:0;padding-right:0}
  .topbar{top:calc(env(safe-area-inset-top) + 6px);left:6px;right:6px;grid-template-columns:56px 1fr 56px}
  .small-btn{padding:8px;font-size:12px}
  .icon-btn{height:36px}
  .icon-btn svg{width:22px;height:22px}
  .right-controls{gap:6px}
  .board-wrap{width:min(100vw,calc(100dvh - 120px));height:min(100vw,calc(100dvh - 120px));border-radius:18px;margin-top:52px}
  .menu-card{padding:24px 18px}
  .choice-btn{min-width:82px;padding:10px 14px}
  .difficulty-grid{grid-template-columns:repeat(2,minmax(92px,126px));gap:10px}
  .bottom-note{display:none}
  .moon{top:4vh;right:6vw;width:52px;height:52px}
  .menu-mountains{height:30vh}
  .game-glyph.top{top:calc(env(safe-area-inset-top) + 62px)}
  .game-glyph.bottom{bottom:calc(env(safe-area-inset-bottom) + 4px);height:62px}
}
@media(orientation:landscape) and (max-height:520px){
  .topbar{grid-template-columns:68px 1fr 68px;min-height:46px}
  .status-panel{padding:6px 10px}
  #modeText{display:none}
  .board-wrap{margin-top:46px;width:min(82vh,72vw);height:min(82vh,72vw)}
  .moon{top:5vh;right:6vw;width:46px;height:46px}
  .menu-mountains{height:24vh}
  .game-glyph{display:none}
}
</style>
</head>

<body>
<div id="app">
  <div class="background"></div>
  <div class="mist"></div>

  <section id="menuScreen" class="screen active">
    <div class="menu-scene">
      <div class="moon"></div>
      <div class="star s1"></div>
      <div class="star s2"></div>
      <div class="star s3"></div>
      <div class="star s4"></div>
      <div class="star s5"></div>
      <div class="menu-mountains"></div>
    </div>

    <div class="menu-card">
      <h1 class="title">慢慢五子棋</h1>
      <p class="subtitle">在藍紫色的星霧森林裡，<br>慢慢思考，安靜對弈。</p>

      <div class="section-title">模式</div>
      <div class="choice-row">
        <button class="choice-btn selected" data-mode="ai">和電腦對戰</button>
        <button class="choice-btn" data-mode="pvp">兩人對戰</button>
      </div>

      <div class="section-title">難度</div>
      <div class="difficulty-grid">
        <button class="choice-btn" data-difficulty="easy">簡單</button>
        <button class="choice-btn selected" data-difficulty="normal">普通</button>
        <button class="choice-btn" data-difficulty="hard">困難</button>
        <button class="choice-btn" data-difficulty="master">大師</button>
      </div>

      <button
